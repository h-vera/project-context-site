<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Luke–Acts inversion wheel">
  <defs>
    <linearGradient id="wheelBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(42,161,152,0.12)"/>
      <stop offset="1" stop-color="rgba(0,0,0,0.02)"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(42,161,152,0.22)"/>
      <stop offset="1" stop-color="rgba(42,161,152,0.06)"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="rgba(0,0,0,0.16)"/>
    </filter>
  </defs>

  <rect x="28" y="28" width="1144" height="664" rx="26" fill="white" stroke="rgba(42,161,152,0.25)" stroke-width="3" filter="url(#softShadow)"/>

  <text x="70" y="92" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="900" fill="#0f172a">
    Inversion Wheel
  </text>
  <text x="70" y="124" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="13" font-weight="700" fill="#475569">
    Choose a quadrant lens → read paired scenes → name the verdict → trace Temple → Nations.
  </text>

  <g transform="translate(380,390)">
    <circle r="252" fill="url(#wheelBg)" stroke="rgba(42,161,152,0.30)" stroke-width="4"/>
    <circle r="166" fill="rgba(255,255,255,0.90)" stroke="rgba(42,161,152,0.20)" stroke-width="3"/>
    <circle r="72"  fill="rgba(42,161,152,0.18)" stroke="rgba(15,118,110,0.75)" stroke-width="3"/>

    <text text-anchor="middle" y="-8" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" font-weight="900" fill="rgba(15,118,110,0.95)" letter-spacing="2">
      KINGDOM
    </text>
    <text text-anchor="middle" y="16" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" font-weight="800" fill="#475569">
      invert • witness • expand
    </text>

    <line x1="-252" y1="0" x2="252" y2="0" stroke="rgba(42,161,152,0.35)" stroke-width="3"/>
    <line x1="0" y1="-252" x2="0" y2="252" stroke="rgba(42,161,152,0.35)" stroke-width="3"/>

    <g>
      <path d="M0,0 L0,-252 A252,252 0 0,1 252,0 Z" fill="rgba(42,161,152,0.10)" stroke="rgba(42,161,152,0.22)" stroke-width="2"/>
      <text x="106" y="-118" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="900" fill="rgba(15,118,110,0.95)" letter-spacing="2">STATUS</text>
      <text x="106" y="-92" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" font-weight="800" fill="#475569">insider ⇄ receiver</text>
    </g>
    <g>
      <path d="M0,0 L252,0 A252,252 0 0,1 0,252 Z" fill="rgba(42,161,152,0.08)" stroke="rgba(42,161,152,0.22)" stroke-width="2"/>
      <text x="112" y="124" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="900" fill="rgba(15,118,110,0.95)" letter-spacing="2">PURITY</text>
      <text x="112" y="150" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" font-weight="800" fill="#475569">boundary ⇄ welcome</text>
    </g>
    <g>
      <path d="M0,0 L0,252 A252,252 0 0,1 -252,0 Z" fill="rgba(42,161,152,0.10)" stroke="rgba(42,161,152,0.22)" stroke-width="2"/>
      <text x="-126" y="124" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="900" fill="rgba(15,118,110,0.95)" letter-spacing="2">WEALTH</text>
      <text x="-126" y="150" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" font-weight="800" fill="#475569">clutch ⇄ release</text>
    </g>
    <g>
      <path d="M0,0 L-252,0 A252,252 0 0,1 0,-252 Z" fill="rgba(42,161,152,0.08)" stroke="rgba(42,161,152,0.22)" stroke-width="2"/>
      <text x="-132" y="-118" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="900" fill="rgba(15,118,110,0.95)" letter-spacing="2">POWER</text>
      <text x="-132" y="-92" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" font-weight="800" fill="#475569">control ⇄ witness</text>
    </g>
  </g>

  <g transform="translate(720,188)">
    <rect x="0" y="0" width="410" height="360" rx="22" fill="white" stroke="rgba(42,161,152,0.22)" stroke-width="3"/>
    <text x="26" y="56" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="16" font-weight="900" fill="#0f172a">How to use</text>
    <text x="26" y="90" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="13" font-weight="700" fill="#475569">1) Pick a quadrant lens.</text>
    <text x="26" y="120" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="13" font-weight="700" fill="#475569">2) Read 3–6 pairs in sequence.</text>
    <text x="26" y="150" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="13" font-weight="700" fill="#475569">3) Name Luke’s verdict (one line).</text>
    <text x="26" y="180" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="13" font-weight="700" fill="#475569">4) Trace expansion: Temple → Nations.</text>

    <rect x="26" y="220" width="358" height="102" rx="18" fill="url(#chipGrad)" stroke="rgba(42,161,152,0.18)" stroke-width="2"/>
    <text x="46" y="254" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" font-weight="900" fill="rgba(15,118,110,0.95)" letter-spacing="2">DEFAULT TEACHING RUN</text>
    <text x="46" y="284" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="13" font-weight="800" fill="#0f172a">Status → Wealth → Purity → Power</text>
    <text x="46" y="310" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" font-weight="700" fill="#475569">End with Acts 28: “chains ⇄ unhindered.”</text>
  </g>
</svg>
