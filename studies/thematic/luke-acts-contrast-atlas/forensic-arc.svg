<svg viewBox="0 0 1200 1100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Acts 21–28: Forensic Arc — Jerusalem to Rome">
  <defs>
    <linearGradient id="trialGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(114,9,183,0.08)"/>
      <stop offset="1" stop-color="rgba(114,9,183,0.02)"/>
    </linearGradient>
    <linearGradient id="verdictGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(42,161,152,0.12)"/>
      <stop offset="1" stop-color="rgba(42,161,152,0.04)"/>
    </linearGradient>
    <linearGradient id="stormGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(100,116,139,0.10)"/>
      <stop offset="1" stop-color="rgba(42,161,152,0.06)"/>
    </linearGradient>
    <linearGradient id="endGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(42,161,152,0.18)"/>
      <stop offset="1" stop-color="rgba(15,118,110,0.08)"/>
    </linearGradient>
    <linearGradient id="ironyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(212,168,83,0.10)"/>
      <stop offset="1" stop-color="rgba(212,168,83,0.03)"/>
    </linearGradient>
    <marker id="fArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="rgba(114,9,183,0.60)"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="rgba(0,0,0,0.14)"/>
    </filter>
    <style>
      .frame { fill: white; stroke: rgba(42,161,152,0.25); stroke-width: 3; }
      .title { font-family: Inter, system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 900; fill: #0f172a; }
      .subtitle { font-family: Inter, system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #475569; }
      .stage-box { rx: 16; fill: url(#trialGrad); stroke: rgba(114,9,183,0.18); stroke-width: 2; }
      .storm-box { rx: 16; fill: url(#stormGrad); stroke: rgba(100,116,139,0.22); stroke-width: 2; }
      .stage-num { font-family: Inter, system-ui, sans-serif; font-size: 11px; font-weight: 900; fill: rgba(114,9,183,0.70); letter-spacing: 2px; }
      .stage-title { font-family: Inter, system-ui, sans-serif; font-size: 15px; font-weight: 900; fill: #0f172a; }
      .stage-text { font-family: Inter, system-ui, sans-serif; font-size: 12px; font-weight: 700; fill: #475569; }
      .stage-ref { font-family: Inter, system-ui, sans-serif; font-size: 11px; font-weight: 700; fill: #94a3b8; }
      .irony-chip { rx: 10; fill: url(#ironyGrad); stroke: rgba(212,168,83,0.25); stroke-width: 1.5; }
      .irony-text { font-family: Inter, system-ui, sans-serif; font-size: 11px; font-weight: 800; fill: rgba(161,120,40,0.90); font-style: italic; }
      .verdict-box { rx: 14; fill: url(#verdictGrad); stroke: rgba(42,161,152,0.22); stroke-width: 2; }
      .verdict-label { font-family: Inter, system-ui, sans-serif; font-size: 11px; font-weight: 900; fill: rgba(15,118,110,0.90); letter-spacing: 2px; }
      .verdict-text { font-family: Inter, system-ui, sans-serif; font-size: 12px; font-weight: 700; fill: #0f766e; }
      .end-box { rx: 18; fill: url(#endGrad2); stroke: rgba(15,118,110,0.50); stroke-width: 3; }
      .end-title { font-family: Inter, system-ui, sans-serif; font-size: 15px; font-weight: 900; fill: rgba(15,118,110,0.95); letter-spacing: 2px; }
      .end-text { font-family: Inter, system-ui, sans-serif; font-size: 13px; font-weight: 800; fill: #0f172a; }
      .end-sub { font-family: Inter, system-ui, sans-serif; font-size: 12px; font-weight: 700; fill: #64748b; }
      .spine { fill: none; stroke: rgba(114,9,183,0.30); stroke-width: 4; stroke-dasharray: 10 6; }
      .route-label { font-family: Inter, system-ui, sans-serif; font-size: 11px; font-weight: 900; fill: rgba(114,9,183,0.50); letter-spacing: 3px; }
      .theme-box { rx: 12; fill: rgba(114,9,183,0.04); stroke: rgba(114,9,183,0.12); stroke-width: 1.5; }
      .theme-text { font-family: Inter, system-ui, sans-serif; font-size: 12px; font-weight: 800; fill: #475569; }
    </style>
  </defs>

  <rect x="24" y="24" width="1152" height="1052" rx="26" class="frame" filter="url(#softShadow)"/>

  <!-- Title -->
  <text x="65" y="78" class="title">Acts 21–28: The Forensic Arc</text>
  <text x="65" y="106" class="subtitle">Jerusalem → Caesarea → Rome — the case keeps collapsing; the witness keeps advancing</text>

  <!-- Route label left spine -->
  <text x="52" y="420" class="route-label" transform="rotate(-90, 52, 420)">JERUSALEM → CAESAREA → SEA → ROME</text>

  <!-- Central spine -->
  <path d="M 120 145 L 120 980" class="spine" marker-end="url(#fArrow)"/>

  <!-- ═══ STAGE 1: Jerusalem — Spark → Arrest ═══ -->
  <rect x="155" y="140" width="490" height="105" class="stage-box"/>
  <text x="185" y="164" class="stage-num">ACTS 21</text>
  <text x="185" y="188" class="stage-title">Jerusalem: Spark → Arrest</text>
  <text x="185" y="210" class="stage-text">Paul in Temple — accused of defiling the holy place</text>
  <text x="185" y="228" class="stage-text">Roman soldiers rescue Paul from the mob</text>

  <rect x="685" y="152" width="430" height="44" class="irony-chip"/>
  <text x="710" y="180" class="irony-text">Irony 1: Empire restrains religious violence</text>

  <!-- ═══ STAGE 2: Hearings + Plots ═══ -->
  <rect x="155" y="275" width="490" height="120" class="stage-box"/>
  <text x="185" y="299" class="stage-num">ACTS 22–23</text>
  <text x="185" y="323" class="stage-title">Hearings + Plots</text>
  <text x="185" y="345" class="stage-text">Paul before crowd → rejection</text>
  <text x="185" y="363" class="stage-text">Paul before Sanhedrin → Pharisee / Sadducee split</text>
  <text x="185" y="381" class="stage-text">40+ oath-takers plot assassination → transfer to Caesarea</text>

  <rect x="685" y="300" width="430" height="44" class="irony-chip"/>
  <text x="710" y="328" class="irony-text">Irony 2: Custody becomes the mission corridor</text>

  <!-- ═══ STAGE 3: Felix ═══ -->
  <rect x="155" y="425" width="490" height="118" class="stage-box"/>
  <text x="185" y="449" class="stage-num">ACTS 24 — FELIX</text>
  <text x="185" y="473" class="stage-title">Caesarea I: Prosecution &amp; Delay</text>
  <text x="185" y="495" class="stage-text">Tertullus: "a pestilent fellow… ringleader of the Nazarenes"</text>
  <text x="185" y="513" class="stage-text">Paul: resurrection and righteousness</text>
  <text x="185" y="531" class="stage-text">Felix trembles… delays. Two years pass.</text>

  <rect x="685" y="448" width="430" height="62" class="verdict-box"/>
  <text x="710" y="470" class="verdict-label">VERDICT</text>
  <text x="710" y="494" class="verdict-text">Power recognizes truth but cannot commit</text>

  <!-- ═══ STAGE 4: Festus ═══ -->
  <rect x="155" y="575" width="490" height="100" class="stage-box"/>
  <text x="185" y="599" class="stage-num">ACTS 25 — FESTUS</text>
  <text x="185" y="623" class="stage-title">Caesarea II: Appeal to Caesar</text>
  <text x="185" y="645" class="stage-text">"I found he had done nothing deserving death"</text>
  <text x="185" y="663" class="stage-text">Paul appeals to Caesar → the road to Rome opens</text>

  <rect x="685" y="598" width="430" height="44" class="irony-chip"/>
  <text x="710" y="626" class="irony-text">Irony 3: Political calculation serves divine geography</text>

  <!-- ═══ STAGE 5: Agrippa ═══ -->
  <rect x="155" y="705" width="490" height="100" class="stage-box"/>
  <text x="185" y="729" class="stage-num">ACTS 26 — AGRIPPA</text>
  <text x="185" y="753" class="stage-title">Caesarea III: Royal Hearing</text>
  <text x="185" y="775" class="stage-text">"Are you so quickly persuading me to become a Christian?"</text>
  <text x="185" y="793" class="stage-text">"This man could have been set free"</text>

  <rect x="685" y="728" width="430" height="44" class="irony-chip"/>
  <text x="710" y="756" class="irony-text">Irony 4: Innocent but Rome-bound — by his own appeal</text>

  <!-- ═══ STAGE 6: Storm ═══ -->
  <rect x="155" y="835" width="490" height="100" class="storm-box"/>
  <text x="185" y="859" class="stage-num">ACTS 27 — THE STORM</text>
  <text x="185" y="883" class="stage-title">Shipwreck Theology</text>
  <text x="185" y="905" class="stage-text">All human control lost — sailors helpless, cargo overboard</text>
  <text x="185" y="923" class="stage-text">"Not one of you will lose a hair" — 276 saved on planks</text>

  <rect x="685" y="858" width="430" height="62" class="verdict-box"/>
  <text x="710" y="880" class="verdict-label">VERDICT</text>
  <text x="710" y="904" class="verdict-text">Control lost → providence revealed</text>

  <!-- ═══ END STATE: Rome ═══ -->
  <rect x="155" y="970" width="960" height="80" class="end-box"/>
  <text x="185" y="998" class="end-title">ACTS 28 — ROME</text>
  <text x="380" y="998" class="end-text">CHAINS ⇄ ἀκωλύτως (akōlytōs) = "UNHINDERED"</text>
  <text x="185" y="1028" class="end-sub">The messenger is bound. The word is free. The story ends open — you continue it.</text>

  <!-- Theme summary bar -->
  <rect x="685" y="138" width="430" height="1" stroke="none" fill="none"/>

  <!-- Connecting dots on spine -->
  <circle cx="120" cy="192" r="6" fill="rgba(114,9,183,0.30)" stroke="rgba(114,9,183,0.50)" stroke-width="2"/>
  <circle cx="120" cy="335" r="6" fill="rgba(114,9,183,0.30)" stroke="rgba(114,9,183,0.50)" stroke-width="2"/>
  <circle cx="120" cy="484" r="6" fill="rgba(114,9,183,0.30)" stroke="rgba(114,9,183,0.50)" stroke-width="2"/>
  <circle cx="120" cy="625" r="6" fill="rgba(114,9,183,0.30)" stroke="rgba(114,9,183,0.50)" stroke-width="2"/>
  <circle cx="120" cy="755" r="6" fill="rgba(114,9,183,0.30)" stroke="rgba(114,9,183,0.50)" stroke-width="2"/>
  <circle cx="120" cy="885" r="6" fill="rgba(114,9,183,0.30)" stroke="rgba(114,9,183,0.50)" stroke-width="2"/>
  <circle cx="120" cy="1010" r="8" fill="rgba(15,118,110,0.40)" stroke="rgba(15,118,110,0.70)" stroke-width="3"/>
</svg>
