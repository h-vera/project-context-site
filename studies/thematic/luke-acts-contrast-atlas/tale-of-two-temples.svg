<svg viewBox="0 0 900 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Acts 2–7: Tale of Two Temples">
  <defs>
    <linearGradient id="flowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(42,161,152,0.18)"/>
      <stop offset="1" stop-color="rgba(42,161,152,0.04)"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(42,161,152,0.12)"/>
      <stop offset="1" stop-color="rgba(42,161,152,0.03)"/>
    </linearGradient>
    <linearGradient id="clashGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(225,29,72,0.08)"/>
      <stop offset="1" stop-color="rgba(114,9,183,0.06)"/>
    </linearGradient>
    <marker id="flowArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="rgba(42,161,152,0.75)"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="rgba(0,0,0,0.14)"/>
    </filter>
    <style>
      .frame { fill: white; stroke: rgba(42,161,152,0.25); stroke-width: 3; }
      .title { font-family: Inter, system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 900; fill: #0f172a; }
      .subtitle { font-family: Inter, system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #475569; }
      .node-box { rx: 16; fill: url(#nodeGrad); stroke: rgba(42,161,152,0.22); stroke-width: 2; }
      .clash-box { rx: 16; fill: url(#clashGrad); stroke: rgba(225,29,72,0.20); stroke-width: 2; }
      .node-title { font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 900; fill: rgba(15,118,110,0.95); letter-spacing: 1px; }
      .node-text { font-family: Inter, system-ui, sans-serif; font-size: 12px; font-weight: 700; fill: #475569; }
      .node-icon { font-size: 22px; }
      .spine { fill: none; stroke: rgba(42,161,152,0.45); stroke-width: 4; stroke-dasharray: 8 6; }
      .clash-title { font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 900; fill: rgba(190,24,93,0.95); letter-spacing: 1px; }
      .clash-text { font-family: Inter, system-ui, sans-serif; font-size: 12px; font-weight: 700; fill: #64748b; }
      .result-box { rx: 16; fill: rgba(42,161,152,0.10); stroke: rgba(15,118,110,0.45); stroke-width: 3; }
      .result-title { font-family: Inter, system-ui, sans-serif; font-size: 13px; font-weight: 900; fill: rgba(15,118,110,0.95); letter-spacing: 2px; }
      .result-text { font-family: Inter, system-ui, sans-serif; font-size: 12px; font-weight: 800; fill: #0f172a; }
      .ref { font-family: Inter, system-ui, sans-serif; font-size: 11px; font-weight: 700; fill: #94a3b8; }
    </style>
  </defs>

  <rect x="24" y="24" width="852" height="772" rx="26" class="frame" filter="url(#softShadow)"/>

  <!-- Title -->
  <text x="65" y="80" class="title">Tale of Two Temples</text>
  <text x="65" y="108" class="subtitle">Acts 2–7: Conflict at the Center</text>

  <!-- Spine line -->
  <path d="M 450 155 L 450 700" class="spine" marker-end="url(#flowArrow)"/>

  <!-- Node 1: God's Presence Arrives -->
  <rect x="195" y="140" width="510" height="80" class="node-box"/>
  <text x="230" y="170" class="node-icon">🔥</text>
  <text x="260" y="172" class="node-title">GOD'S PRESENCE ARRIVES</text>
  <text x="260" y="196" class="node-text">Fire / wind → people become the temple</text>
  <text x="630" y="196" class="ref">Acts 2:1–4</text>

  <!-- Node 2: New Community Forms -->
  <rect x="195" y="248" width="510" height="80" class="node-box"/>
  <text x="230" y="278" class="node-icon">🍞</text>
  <text x="260" y="280" class="node-title">NEW TEMPLE COMMUNITY FORMS</text>
  <text x="260" y="304" class="node-text">Generosity + meals + worship + shared life</text>
  <text x="612" y="304" class="ref">Acts 2:42–47</text>

  <!-- Node 3: New Temple in Temple Courts -->
  <rect x="195" y="356" width="510" height="80" class="node-box"/>
  <text x="230" y="386" class="node-icon">✋</text>
  <text x="260" y="388" class="node-title">NEW TEMPLE IN TEMPLE COURTS</text>
  <text x="260" y="412" class="node-text">Healings + proclamation in the old temple's space</text>
  <text x="618" y="412" class="ref">Acts 3:1–26</text>

  <!-- Node 4: Old Temple Retaliates (clash) -->
  <rect x="195" y="464" width="510" height="80" class="clash-box"/>
  <text x="230" y="494" class="node-icon">⚖️</text>
  <text x="260" y="496" class="clash-title">OLD TEMPLE LEADERS RETALIATE</text>
  <text x="260" y="520" class="clash-text">Arrests + threats + trials + "Do not speak in this name"</text>
  <text x="612" y="520" class="ref">Acts 4:1–5:18</text>

  <!-- Node 5: Center Test — split -->
  <rect x="90" y="576" width="310" height="88" class="node-box"/>
  <text x="116" y="604" class="node-icon">✅</text>
  <text x="145" y="607" class="node-title">TRUE GIFT</text>
  <text x="145" y="630" class="node-text">Barnabas: open-handed</text>
  <text x="145" y="648" class="node-text">Genuine surrender → trust builds</text>

  <rect x="500" y="576" width="310" height="88" class="clash-box"/>
  <text x="526" y="604" class="node-icon">❌</text>
  <text x="555" y="607" class="clash-title">PERFORMED GIFT</text>
  <text x="555" y="630" class="clash-text">Ananias &amp; Sapphira: staged</text>
  <text x="555" y="648" class="clash-text">Deception → judgment / purification</text>

  <!-- VS label -->
  <text x="430" y="625" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="900" fill="rgba(114,9,183,0.7)" text-anchor="middle">VS</text>

  <!-- Result box -->
  <rect x="145" y="700" width="610" height="70" class="result-box"/>
  <text x="450" y="728" class="result-title" text-anchor="middle">SCATTERING → MISSION</text>
  <text x="450" y="750" class="result-text" text-anchor="middle">Persecution meant to contain becomes the mechanism of expansion</text>
</svg>
