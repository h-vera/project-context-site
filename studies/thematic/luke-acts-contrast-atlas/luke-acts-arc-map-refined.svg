<svg viewBox="0 0 1400 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Luke–Acts arc map: Temple to Nations">
  <defs>
    <linearGradient id="lane" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(42,161,152,0.20)"/>
      <stop offset="1" stop-color="rgba(42,161,152,0.05)"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="rgba(0,0,0,0.16)"/>
    </filter>
  </defs>

  <rect x="26" y="26" width="1348" height="368" rx="26" fill="white" stroke="rgba(42,161,152,0.25)" stroke-width="3" filter="url(#shadow)"/>
  <text x="70" y="86" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="900" fill="#0f172a">Two-Volume Arc Map</text>
  <text x="70" y="118" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="13" font-weight="700" fill="#475569">Temple → Table → Road → City → Nations (Luke → Acts)</text>

  <rect x="70" y="180" width="1260" height="70" rx="20" fill="url(#lane)" stroke="rgba(42,161,152,0.18)" stroke-width="2"/>

  <g font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
    <path d="M 150 215 L 1240 215" stroke="rgba(42,161,152,0.55)" stroke-width="6" stroke-linecap="round"/>
    <path d="M 1240 215 L 1216 203 L 1216 227 Z" fill="rgba(42,161,152,0.70)"/>

    <circle cx="120" cy="215" r="22" fill="rgba(42,161,152,0.22)" stroke="rgba(15,118,110,0.85)" stroke-width="3"/>
    <text x="120" y="160" text-anchor="middle" font-size="12" font-weight="900" fill="rgba(15,118,110,0.95)" letter-spacing="2">TEMPLE</text>
    <text x="120" y="290" text-anchor="middle" font-size="12" font-weight="800" fill="#475569">Luke 1–2</text>

    <circle cx="420" cy="215" r="22" fill="rgba(42,161,152,0.18)" stroke="rgba(15,118,110,0.75)" stroke-width="3"/>
    <text x="420" y="160" text-anchor="middle" font-size="12" font-weight="900" fill="rgba(15,118,110,0.95)" letter-spacing="2">TABLE</text>
    <text x="420" y="290" text-anchor="middle" font-size="12" font-weight="800" fill="#475569">Luke 4–10</text>

    <circle cx="700" cy="215" r="22" fill="rgba(42,161,152,0.18)" stroke="rgba(15,118,110,0.75)" stroke-width="3"/>
    <text x="700" y="160" text-anchor="middle" font-size="12" font-weight="900" fill="rgba(15,118,110,0.95)" letter-spacing="2">ROAD</text>
    <text x="700" y="290" text-anchor="middle" font-size="12" font-weight="800" fill="#475569">Luke 11–19</text>

    <circle cx="980" cy="215" r="22" fill="rgba(42,161,152,0.18)" stroke="rgba(15,118,110,0.75)" stroke-width="3"/>
    <text x="980" y="160" text-anchor="middle" font-size="12" font-weight="900" fill="rgba(15,118,110,0.95)" letter-spacing="2">CITY</text>
    <text x="980" y="290" text-anchor="middle" font-size="12" font-weight="800" fill="#475569">Acts 1–7</text>

    <circle cx="1260" cy="215" r="22" fill="rgba(42,161,152,0.22)" stroke="rgba(15,118,110,0.85)" stroke-width="3"/>
    <text x="1260" y="160" text-anchor="middle" font-size="12" font-weight="900" fill="rgba(15,118,110,0.95)" letter-spacing="2">NATIONS</text>
    <text x="1260" y="290" text-anchor="middle" font-size="12" font-weight="800" fill="#475569">Acts 8–28</text>
  </g>

  <text x="70" y="350" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="13" font-weight="800" fill="#0f172a">
    Thesis: Luke teaches discernment by juxtaposition — “Who recognizes God’s work and responds?”
  </text>
</svg>
