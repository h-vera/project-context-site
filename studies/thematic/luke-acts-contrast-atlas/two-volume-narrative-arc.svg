<svg viewBox="0 0 1200 980" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Luke–Acts Two-Volume Narrative Arc">
  <defs>
    <linearGradient id="lukeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(42,161,152,0.10)"/>
      <stop offset="1" stop-color="rgba(42,161,152,0.03)"/>
    </linearGradient>
    <linearGradient id="actsGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(114,9,183,0.08)"/>
      <stop offset="1" stop-color="rgba(114,9,183,0.02)"/>
    </linearGradient>
    <linearGradient id="hingeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(225,29,72,0.08)"/>
      <stop offset="1" stop-color="rgba(212,168,83,0.08)"/>
    </linearGradient>
    <linearGradient id="endGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(42,161,152,0.15)"/>
      <stop offset="1" stop-color="rgba(15,118,110,0.08)"/>
    </linearGradient>
    <marker id="arcArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="rgba(42,161,152,0.75)"/>
    </marker>
    <marker id="arcArrowP" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="rgba(114,9,183,0.65)"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="rgba(0,0,0,0.14)"/>
    </filter>
    <style>
      .frame { fill: white; stroke: rgba(42,161,152,0.25); stroke-width: 3; }
      .title { font-family: Inter, system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 900; fill: #0f172a; }
      .subtitle { font-family: Inter, system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #475569; }
      .vol-label { font-family: Inter, system-ui, sans-serif; font-size: 11px; font-weight: 900; letter-spacing: 2px; }
      .vol-luke { fill: rgba(15,118,110,0.90); }
      .vol-acts { fill: rgba(114,9,183,0.85); }
      .phase-box { rx: 16; stroke-width: 2; }
      .phase-luke { fill: url(#lukeGrad); stroke: rgba(42,161,152,0.22); }
      .phase-acts { fill: url(#actsGrad); stroke: rgba(114,9,183,0.18); }
      .phase-title { font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 900; letter-spacing: 1px; }
      .phase-title-t { fill: rgba(15,118,110,0.95); }
      .phase-title-a { fill: rgba(114,9,183,0.90); }
      .phase-desc { font-family: Inter, system-ui, sans-serif; font-size: 12px; font-weight: 700; fill: #475569; }
      .phase-test { font-family: Inter, system-ui, sans-serif; font-size: 11px; font-weight: 800; fill: #94a3b8; font-style: italic; }
      .ref { font-family: Inter, system-ui, sans-serif; font-size: 11px; font-weight: 700; fill: #94a3b8; }
      .hinge-box { rx: 14; fill: url(#hingeGrad); stroke: rgba(225,29,72,0.22); stroke-width: 2.5; }
      .hinge-title { font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 900; fill: rgba(190,24,93,0.90); letter-spacing: 1px; }
      .hinge-text { font-family: Inter, system-ui, sans-serif; font-size: 12px; font-weight: 700; fill: #64748b; }
      .end-box { rx: 16; fill: url(#endGrad); stroke: rgba(15,118,110,0.50); stroke-width: 3; }
      .end-title { font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 900; fill: rgba(15,118,110,0.95); letter-spacing: 2px; }
      .end-text { font-family: Inter, system-ui, sans-serif; font-size: 13px; font-weight: 800; fill: #0f172a; }
      .end-sub { font-family: Inter, system-ui, sans-serif; font-size: 12px; font-weight: 700; fill: #64748b; }
      .flow { fill: none; stroke-width: 4; stroke-dasharray: 10 6; }
      .flow-luke { stroke: rgba(42,161,152,0.45); }
      .flow-acts { stroke: rgba(114,9,183,0.35); }
      .flow-down { fill: none; stroke: rgba(100,100,100,0.20); stroke-width: 2; stroke-dasharray: 4 4; }
    </style>
  </defs>

  <rect x="24" y="24" width="1152" height="932" rx="26" class="frame" filter="url(#softShadow)"/>

  <!-- Title -->
  <text x="65" y="78" class="title">Two-Volume Narrative Arc</text>
  <text x="65" y="106" class="subtitle">A two-volume story told by contrasts: Temple → Table → Road → City → Nations</text>

  <!-- VOLUME LABELS -->
  <text x="65" y="152" class="vol-label vol-luke">LUKE</text>
  <line x1="108" y1="148" x2="1120" y2="148" stroke="rgba(42,161,152,0.12)" stroke-width="2"/>

  <!-- ── LUKE ROW: Temple / Table / Road ── -->

  <!-- Temple -->
  <rect x="65" y="170" width="320" height="145" class="phase-box phase-luke"/>
  <text x="95" y="200" class="phase-title phase-title-t">TEMPLE</text>
  <text x="95" y="222" class="phase-desc">Holy place — prayer &amp; promise</text>
  <text x="95" y="244" class="phase-desc">Insider hesitation beside outsider surrender</text>
  <text x="95" y="272" class="phase-test">↳ Status tests</text>
  <text x="95" y="296" class="ref">Luke 1–2</text>

  <path d="M 395 242 L 430 242" class="flow flow-luke" marker-end="url(#arcArrow)"/>

  <!-- Table -->
  <rect x="440" y="170" width="320" height="145" class="phase-box phase-luke"/>
  <text x="470" y="200" class="phase-title phase-title-t">TABLE</text>
  <text x="470" y="222" class="phase-desc">Fellowship — outsiders welcomed in</text>
  <text x="470" y="244" class="phase-desc">Meals as battlefields for purity and mercy</text>
  <text x="470" y="272" class="phase-test">↳ Debt / love tests</text>
  <text x="470" y="296" class="ref">Luke 4–10</text>

  <path d="M 770 242 L 805 242" class="flow flow-luke" marker-end="url(#arcArrow)"/>

  <!-- Road -->
  <rect x="815" y="170" width="320" height="145" class="phase-box phase-luke"/>
  <text x="845" y="200" class="phase-title phase-title-t">ROAD</text>
  <text x="845" y="222" class="phase-desc">Journey — "seeing" and "hearing"</text>
  <text x="845" y="244" class="phase-desc">Reshaped by Jesus on the way</text>
  <text x="845" y="272" class="phase-test">↳ Sight / blindness tests</text>
  <text x="845" y="296" class="ref">Luke 11–19</text>

  <!-- ── HINGE: Passion / Exodus ── -->
  <rect x="130" y="360" width="940" height="100" class="hinge-box"/>
  <text x="600" y="398" class="hinge-title" text-anchor="middle">PASSION / EXODUS MOMENT — Luke 22–24</text>
  <text x="600" y="422" class="hinge-text" text-anchor="middle">The King enthroned by suffering. Two criminals: mock vs trust. Women remain; disciples scatter.</text>
  <text x="600" y="442" class="hinge-text" text-anchor="middle">The temple story turns outward — hinge of the two-volume work.</text>

  <!-- Down-flow arrows from Luke row to hinge -->
  <path d="M 225 315 L 225 355" class="flow-down"/>
  <path d="M 600 315 L 600 355" class="flow-down"/>
  <path d="M 975 315 L 975 355" class="flow-down"/>

  <!-- ── ACTS LABEL ── -->
  <text x="65" y="514" class="vol-label vol-acts">ACTS</text>
  <line x1="108" y1="510" x2="1120" y2="510" stroke="rgba(114,9,183,0.10)" stroke-width="2"/>

  <!-- Down arrows from hinge to Acts row -->
  <path d="M 225 460 L 225 526" class="flow-down"/>
  <path d="M 600 460 L 600 526" class="flow-down"/>
  <path d="M 975 460 L 975 526" class="flow-down"/>

  <!-- ── ACTS ROW: City / Households / Nations ── -->

  <!-- City -->
  <rect x="65" y="530" width="320" height="145" class="phase-box phase-acts"/>
  <text x="95" y="560" class="phase-title phase-title-a">CITY</text>
  <text x="95" y="582" class="phase-desc">Spirit-witness in Jerusalem</text>
  <text x="95" y="604" class="phase-desc">New temple community vs old temple power</text>
  <text x="95" y="632" class="phase-test">↳ Real vs performed tests</text>
  <text x="95" y="656" class="ref">Acts 1–7</text>

  <path d="M 395 603 L 430 603" class="flow flow-acts" marker-end="url(#arcArrowP)"/>

  <!-- Households -->
  <rect x="440" y="530" width="320" height="145" class="phase-box phase-acts"/>
  <text x="470" y="560" class="phase-title phase-title-a">HOUSEHOLDS</text>
  <text x="470" y="582" class="phase-desc">Table-communion across every line</text>
  <text x="470" y="604" class="phase-desc">Cornelius, Lydia, jailer — doors open</text>
  <text x="470" y="632" class="phase-test">↳ Gift vs buy tests</text>
  <text x="470" y="656" class="ref">Acts 8–15</text>

  <path d="M 770 603 L 805 603" class="flow flow-acts" marker-end="url(#arcArrowP)"/>

  <!-- Nations -->
  <rect x="815" y="530" width="320" height="145" class="phase-box phase-acts"/>
  <text x="845" y="560" class="phase-title phase-title-a">NATIONS</text>
  <text x="845" y="582" class="phase-desc">Rome-bound gospel — "ends of the earth"</text>
  <text x="845" y="604" class="phase-desc">Jews first → Gentiles; synagogue → world</text>
  <text x="845" y="632" class="phase-test">↳ Jew first → Gentile expansion</text>
  <text x="845" y="656" class="ref">Acts 16–28</text>

  <!-- ── END STATE ── -->
  <rect x="195" y="725" width="810" height="90" class="end-box"/>
  <text x="600" y="758" class="end-title" text-anchor="middle">ACTS 28: CHAINS ⇄ UNHINDERED</text>
  <text x="600" y="784" class="end-text" text-anchor="middle">The messenger is bound; the word is free. The story ends open — you continue it.</text>
  <text x="600" y="802" class="end-sub" text-anchor="middle">ἀκωλύτως (akōlytōs) — the final word of the two-volume work</text>

  <!-- Down arrows to end state -->
  <path d="M 600 675 L 600 720" class="flow-down"/>

  <!-- Bottom thesis line -->
  <text x="600" y="870" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800" fill="#0f172a" text-anchor="middle">
    Thesis: Luke teaches discernment by juxtaposition — "Who recognizes God's work and responds?"
  </text>
  <text x="600" y="896" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#64748b" text-anchor="middle">
    Reading rule: find the pair, then ask what Luke is training you to recognize.
  </text>
</svg>
