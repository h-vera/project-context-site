<svg viewBox="0 0 1100 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Reversal Engine — Magnificat Logic Compressed">
  <defs>
    <linearGradient id="leftGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(225,29,72,0.06)"/>
      <stop offset="1" stop-color="rgba(225,29,72,0.02)"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(42,161,152,0.10)"/>
      <stop offset="1" stop-color="rgba(42,161,152,0.03)"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(225,29,72,0.50)"/>
      <stop offset="1" stop-color="rgba(42,161,152,0.70)"/>
    </linearGradient>
    <linearGradient id="patternGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(114,9,183,0.06)"/>
      <stop offset="1" stop-color="rgba(42,161,152,0.04)"/>
    </linearGradient>
    <marker id="revArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="rgba(42,161,152,0.75)"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="rgba(0,0,0,0.14)"/>
    </filter>
    <style>
      .frame { fill: white; stroke: rgba(42,161,152,0.25); stroke-width: 3; }
      .title { font-family: Inter, system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 900; fill: #0f172a; }
      .subtitle { font-family: Inter, system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #475569; }
      .col-head { font-family: Inter, system-ui, sans-serif; font-size: 11px; font-weight: 900; letter-spacing: 2px; }
      .col-head-left { fill: rgba(190,24,93,0.80); }
      .col-head-right { fill: rgba(15,118,110,0.95); }
      .row-box-l { rx: 12; fill: url(#leftGrad); stroke: rgba(225,29,72,0.15); stroke-width: 2; }
      .row-box-r { rx: 12; fill: url(#rightGrad); stroke: rgba(42,161,152,0.18); stroke-width: 2; }
      .row-label { font-family: Inter, system-ui, sans-serif; font-size: 15px; font-weight: 900; }
      .row-label-l { fill: #be185d; }
      .row-label-r { fill: #0f766e; }
      .arrow-line { fill: none; stroke: url(#arrowGrad); stroke-width: 4; }
      .pattern-box { rx: 14; fill: url(#patternGrad); stroke: rgba(114,9,183,0.15); stroke-width: 2; }
      .pattern-head { font-family: Inter, system-ui, sans-serif; font-size: 11px; font-weight: 900; fill: rgba(114,9,183,0.80); letter-spacing: 2px; }
      .pattern-label-l { font-family: Inter, system-ui, sans-serif; font-size: 13px; font-weight: 800; fill: #be185d; }
      .pattern-label-r { font-family: Inter, system-ui, sans-serif; font-size: 13px; font-weight: 800; fill: #0f766e; }
      .pattern-arrow { font-family: Inter, system-ui, sans-serif; font-size: 13px; font-weight: 900; fill: #94a3b8; }
      .ref { font-family: Inter, system-ui, sans-serif; font-size: 11px; font-weight: 700; fill: #94a3b8; font-style: italic; }
    </style>
  </defs>

  <rect x="24" y="24" width="1052" height="472" rx="26" class="frame" filter="url(#softShadow)"/>

  <!-- Title -->
  <text x="65" y="78" class="title">The Reversal Engine</text>
  <text x="65" y="106" class="subtitle">Magnificat Logic Compressed — Luke 1:51–53 as the hermeneutical key</text>

  <!-- Column headers -->
  <text x="210" y="152" class="col-head col-head-left" text-anchor="middle">BEFORE</text>
  <text x="430" y="152" class="col-head col-head-right" text-anchor="middle">AFTER</text>

  <!-- Row 1: Low Status → Exalted -->
  <rect x="80" y="170" width="260" height="48" class="row-box-l"/>
  <text x="210" y="200" class="row-label row-label-l" text-anchor="middle">LOW STATUS</text>
  <path d="M 355 194 L 395 194" class="arrow-line" marker-end="url(#revArrow)"/>
  <rect x="300" y="170" width="260" height="48" class="row-box-r"/>
  <text x="430" y="200" class="row-label row-label-r" text-anchor="middle">EXALTED</text>

  <!-- Row 2: Proud → Scattered -->
  <rect x="80" y="230" width="260" height="48" class="row-box-l"/>
  <text x="210" y="260" class="row-label row-label-l" text-anchor="middle">PROUD</text>
  <path d="M 355 254 L 395 254" class="arrow-line" marker-end="url(#revArrow)"/>
  <rect x="300" y="230" width="260" height="48" class="row-box-r"/>
  <text x="430" y="260" class="row-label row-label-r" text-anchor="middle">SCATTERED</text>

  <!-- Row 3: Rich → Sent Away Empty -->
  <rect x="80" y="290" width="260" height="48" class="row-box-l"/>
  <text x="210" y="320" class="row-label row-label-l" text-anchor="middle">RICH</text>
  <path d="M 355 314 L 395 314" class="arrow-line" marker-end="url(#revArrow)"/>
  <rect x="300" y="290" width="260" height="48" class="row-box-r"/>
  <text x="430" y="320" class="row-label row-label-r" text-anchor="middle">SENT AWAY EMPTY</text>

  <!-- Row 4: Hungry → Filled -->
  <rect x="80" y="350" width="260" height="48" class="row-box-l"/>
  <text x="210" y="380" class="row-label row-label-l" text-anchor="middle">HUNGRY</text>
  <path d="M 355 374 L 395 374" class="arrow-line" marker-end="url(#revArrow)"/>
  <rect x="300" y="350" width="260" height="48" class="row-box-r"/>
  <text x="430" y="380" class="row-label row-label-r" text-anchor="middle">FILLED</text>

  <!-- Right side: Narrative Pattern -->
  <rect x="620" y="155" width="420" height="260" class="pattern-box"/>
  <text x="650" y="188" class="pattern-head">NARRATIVE PATTERN</text>

  <text x="650" y="222" class="pattern-label-l">Temple Priest</text>
  <text x="830" y="222" class="pattern-arrow">→</text>
  <text x="860" y="222" class="pattern-label-r">Doubt</text>

  <text x="650" y="256" class="pattern-label-l">Young Woman</text>
  <text x="830" y="256" class="pattern-arrow">→</text>
  <text x="860" y="256" class="pattern-label-r">Trust</text>

  <line x1="650" y1="274" x2="1010" y2="274" stroke="rgba(114,9,183,0.10)" stroke-width="2"/>

  <text x="650" y="300" class="pattern-label-l">Religious Elite</text>
  <text x="830" y="300" class="pattern-arrow">→</text>
  <text x="860" y="300" class="pattern-label-r">Reject</text>

  <text x="650" y="334" class="pattern-label-l">Outsiders</text>
  <text x="830" y="334" class="pattern-arrow">→</text>
  <text x="860" y="334" class="pattern-label-r">Receive</text>

  <line x1="650" y1="352" x2="1010" y2="352" stroke="rgba(114,9,183,0.10)" stroke-width="2"/>

  <text x="650" y="378" class="pattern-label-l">Caesar's Empire</text>
  <text x="830" y="378" class="pattern-arrow">→</text>
  <text x="860" y="378" class="pattern-label-r">Temporary</text>

  <text x="650" y="400" class="pattern-label-l">Jesus' Kingdom</text>
  <text x="830" y="400" class="pattern-arrow">→</text>
  <text x="860" y="400" class="pattern-label-r">Unhindered</text>

  <!-- Footer reference -->
  <text x="80" y="450" class="ref">Luke 1:51–53 — "He has scattered the proud… filled the hungry… sent the rich away empty."</text>
  <text x="80" y="472" class="ref">Every contrast pair in the atlas echoes these four lines.</text>
</svg>
