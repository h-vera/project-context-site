<svg viewBox="0 0 1100 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Luke's Juxtaposition Machine — method template">
  <defs>
    <linearGradient id="sceneAGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(225,29,72,0.06)"/>
      <stop offset="1" stop-color="rgba(114,9,183,0.04)"/>
    </linearGradient>
    <linearGradient id="sceneBGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(42,161,152,0.10)"/>
      <stop offset="1" stop-color="rgba(42,161,152,0.03)"/>
    </linearGradient>
    <linearGradient id="verdGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(42,161,152,0.15)"/>
      <stop offset="1" stop-color="rgba(212,168,83,0.10)"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="rgba(0,0,0,0.14)"/>
    </filter>
    <marker id="vArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="rgba(42,161,152,0.75)"/>
    </marker>
    <style>
      .frame { fill: white; stroke: rgba(42,161,152,0.25); stroke-width: 3; }
      .title { font-family: Inter, system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 900; fill: #0f172a; }
      .subtitle { font-family: Inter, system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #475569; }
      .scene-box { rx: 18; stroke-width: 2.5; }
      .scene-a { fill: url(#sceneAGrad); stroke: rgba(225,29,72,0.22); }
      .scene-b { fill: url(#sceneBGrad); stroke: rgba(42,161,152,0.25); }
      .scene-label { font-family: Inter, system-ui, sans-serif; font-size: 11px; font-weight: 900; letter-spacing: 2px; }
      .scene-label-a { fill: rgba(190,24,93,0.85); }
      .scene-label-b { fill: rgba(15,118,110,0.95); }
      .scene-head { font-family: Inter, system-ui, sans-serif; font-size: 16px; font-weight: 900; fill: #0f172a; }
      .scene-text { font-family: Inter, system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #475569; }
      .vs-circle { fill: rgba(114,9,183,0.08); stroke: rgba(114,9,183,0.25); stroke-width: 3; }
      .vs-text { font-family: Inter, system-ui, sans-serif; font-size: 18px; font-weight: 900; fill: rgba(114,9,183,0.85); }
      .verdict-box { rx: 18; fill: url(#verdGrad); stroke: rgba(15,118,110,0.35); stroke-width: 3; }
      .verdict-label { font-family: Inter, system-ui, sans-serif; font-size: 12px; font-weight: 900; fill: rgba(15,118,110,0.95); letter-spacing: 2px; }
      .verdict-text { font-family: Inter, system-ui, sans-serif; font-size: 14px; font-weight: 800; fill: #0f172a; }
      .verdict-sub { font-family: Inter, system-ui, sans-serif; font-size: 12px; font-weight: 700; fill: #64748b; font-style: italic; }
      .flow-line { fill: none; stroke: rgba(42,161,152,0.40); stroke-width: 3; stroke-dasharray: 8 5; }
    </style>
  </defs>

  <rect x="24" y="24" width="1052" height="552" rx="26" class="frame" filter="url(#softShadow)"/>

  <!-- Title -->
  <text x="65" y="80" class="title">Luke's Juxtaposition Machine</text>
  <text x="65" y="108" class="subtitle">The method behind every contrast pair — same setting, opposite response, revealing verdict</text>

  <!-- Scene A -->
  <rect x="65" y="145" width="400" height="220" class="scene-box scene-a"/>
  <text x="95" y="180" class="scene-label scene-label-a">SCENE A — EXPECTED WINNER</text>
  <text x="95" y="215" class="scene-head">Insider / status / control</text>
  <line x1="95" y1="228" x2="420" y2="228" stroke="rgba(225,29,72,0.12)" stroke-width="2"/>
  <text x="95" y="258" class="scene-text">"I see clearly"</text>
  <text x="95" y="283" class="scene-text">Proximity to Torah, Temple, tradition</text>
  <text x="95" y="308" class="scene-text">Boundary-maintaining posture</text>
  <text x="95" y="340" class="scene-text" style="font-style:italic; fill:#94a3b8;">Evaluates, manages, performs</text>

  <!-- Scene B -->
  <rect x="635" y="145" width="400" height="220" class="scene-box scene-b"/>
  <text x="665" y="180" class="scene-label scene-label-b">SCENE B — SURPRISING WINNER</text>
  <text x="665" y="215" class="scene-head">Outsider / low-status / trust</text>
  <line x1="665" y1="228" x2="990" y2="228" stroke="rgba(42,161,152,0.15)" stroke-width="2"/>
  <text x="665" y="258" class="scene-text">"Have mercy on me"</text>
  <text x="665" y="283" class="scene-text">Distance from covenant, clarity of need</text>
  <text x="665" y="308" class="scene-text">Boundary-crossing posture</text>
  <text x="665" y="340" class="scene-text" style="font-style:italic; fill:#94a3b8;">Receives, surrenders, worships</text>

  <!-- VS circle -->
  <circle cx="550" cy="255" r="32" class="vs-circle"/>
  <text x="550" y="262" class="vs-text" text-anchor="middle">VS</text>

  <!-- Flow lines down to verdict -->
  <path d="M 265 365 L 265 415 Q 265 435 285 435 L 500 435" class="flow-line" marker-end="url(#vArrow)"/>
  <path d="M 835 365 L 835 415 Q 835 435 815 435 L 600 435" class="flow-line" marker-end="url(#vArrow)"/>

  <!-- Verdict box -->
  <rect x="175" y="420" width="750" height="120" class="verdict-box"/>
  <text x="550" y="458" class="verdict-label" text-anchor="middle">LUKE'S VERDICT</text>
  <text x="550" y="488" class="verdict-text" text-anchor="middle">"Who recognizes what God is doing — and responds?"</text>
  <text x="550" y="518" class="verdict-sub" text-anchor="middle">Luke teaches theology by letting you watch it. He juxtaposes; he does not explain.</text>
</svg>
