<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Luke–Acts two-volume arc and contrast engines">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(42,161,152,0.18)"/>
      <stop offset="1" stop-color="rgba(42,161,152,0.05)"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(42,161,152,0.25)"/>
      <stop offset="1" stop-color="rgba(0,0,0,0.02)"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="rgba(42,161,152,0.85)"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="rgba(0,0,0,0.16)"/>
    </filter>
    <style>
      .svg-frame { fill: white; stroke: rgba(42,161,152,0.25); stroke-width: 3; }
      .svg-title { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; font-size: 22px; font-weight: 900; fill: #0f172a; }
      .svg-sub   { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; font-size: 13px; font-weight: 700; fill: #475569; }
      .ring      { fill: none; stroke-width: 3; }
      .ring-1    { stroke: rgba(42,161,152,0.12); }
      .ring-2    { stroke: rgba(42,161,152,0.18); }
      .ring-3    { stroke: rgba(42,161,152,0.26); }
      .ring-4    { stroke: rgba(42,161,152,0.38); }
      .core      { fill: url(#coreGrad); stroke: rgba(15,118,110,0.75); stroke-width: 3; }
      .core-title { font-family: Inter, system-ui, sans-serif; font-size: 12px; font-weight: 900; fill: rgba(15,118,110,0.95); letter-spacing: 2px; }
      .core-sub   { font-family: Inter, system-ui, sans-serif; font-size: 11px; font-weight: 700; fill: #475569; }
      .ring-label { font-family: Inter, system-ui, sans-serif; font-size: 12px; font-weight: 900; fill: rgba(15,118,110,0.95); letter-spacing: 2px; }
      .flow-arrow { fill: none; stroke: rgba(42,161,152,0.55); stroke-width: 3; stroke-dasharray: 10 5; }
      .flow-caption { font-family: Inter, system-ui, sans-serif; font-size: 12px; font-weight: 700; fill: #475569; font-style: italic; }
      .engine-box   { fill: rgba(42,161,152,0.06); stroke: rgba(42,161,152,0.22); stroke-width: 2; }
      .engine-title { font-family: Inter, system-ui, sans-serif; font-size: 16px; font-weight: 900; fill: #0f172a; }
      .engine-text  { font-family: Inter, system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #475569; }
      .engine-chip  { font-family: Inter, system-ui, sans-serif; font-size: 11px; font-weight: 900; fill: rgba(15,118,110,0.95); letter-spacing: 1px; }
      .connector       { fill: none; stroke: rgba(42,161,152,0.45); stroke-width: 2; stroke-dasharray: 6 4; }
      .connector-label { font-family: Inter, system-ui, sans-serif; font-size: 11px; font-weight: 700; fill: #475569; text-anchor: end; }
      .connector-label-strong { font-family: Inter, system-ui, sans-serif; font-size: 13px; font-weight: 900; fill: rgba(15,118,110,0.95); text-anchor: end; }
    </style>
  </defs>

  <!-- Frame -->
  <rect x="28" y="28" width="1144" height="664" rx="26" class="svg-frame" filter="url(#softShadow)"/>

  <!-- Left: Arc Rings -->
  <g transform="translate(70,60)">
    <text x="0" y="0" class="svg-title">Two-Volume Arc</text>
    <text x="0" y="28" class="svg-sub">Temple → Table → Road → City → Nations</text>

    <g transform="translate(250,340)">
      <circle r="250" class="ring ring-1"/>
      <circle r="180" class="ring ring-2"/>
      <circle r="110" class="ring ring-3"/>
      <circle r="55"  class="ring ring-4"/>

      <circle r="38" class="core"/>
      <text text-anchor="middle" y="-6" class="core-title">RECOGNITION</text>
      <text text-anchor="middle" y="16" class="core-sub">"What is God doing?"</text>

      <text x="-18" y="-220" class="ring-label">TEMPLE</text>
      <text x="140" y="-140" class="ring-label">TABLE</text>
      <text x="200" y="20" class="ring-label">ROAD</text>
      <text x="120" y="170" class="ring-label">CITY</text>
      <text x="-40" y="235" class="ring-label">NATIONS</text>

      <path d="M 0,-255 C 180,-210 250,-60 250,0 C 250,160 120,240 0,255"
            class="flow-arrow" marker-end="url(#arrowHead)"/>
      <text x="140" y="265" class="flow-caption">Expansion of holy space</text>
    </g>
  </g>

  <!-- Right: Contrast Engines -->
  <g transform="translate(705,92)">
    <text x="0" y="0" class="svg-title">Contrast Engines</text>
    <text x="0" y="28" class="svg-sub">Luke teaches by placing opposites side-by-side</text>

    <g transform="translate(0,60)">
      <rect x="0" y="0" width="420" height="120" rx="18" class="engine-box"/>
      <text x="26" y="40" class="engine-title">Inversion</text>
      <text x="26" y="68" class="engine-text">Low lifted · High humbled</text>
      <text x="26" y="92" class="engine-text">Outsider sees · Insider resists</text>
      <text x="286" y="44" class="engine-chip">Magnificat Logic</text>
    </g>

    <g transform="translate(0,200)">
      <rect x="0" y="0" width="420" height="120" rx="18" class="engine-box"/>
      <text x="26" y="40" class="engine-title">Witness</text>
      <text x="26" y="68" class="engine-text">Women · Foreigners · Poor · Sick</text>
      <text x="26" y="92" class="engine-text">"Unexpected" interpreters become reliable narrators</text>
      <text x="302" y="44" class="engine-chip">Telling Detail</text>
    </g>

    <g transform="translate(0,340)">
      <rect x="0" y="0" width="420" height="120" rx="18" class="engine-box"/>
      <text x="26" y="40" class="engine-title">Counterfeit vs Real</text>
      <text x="26" y="68" class="engine-text">Performance vs surrender</text>
      <text x="26" y="92" class="engine-text">Buying power vs receiving gift</text>
      <text x="300" y="44" class="engine-chip">Acts Intensifies</text>
    </g>

    <path d="M -40,250 C -140,250 -170,250 -210,250"
          class="connector" marker-end="url(#arrowHead)"/>
    <text x="-200" y="230" class="connector-label">produces</text>
    <text x="-250" y="255" class="connector-label-strong">discernment</text>
  </g>
</svg>
