<script>
// ===== GENESIS SEGMENTS =====
const S = [
  { id:'g1_1',  l:'1:1-2',   sh:'1:1',  d:'The absolute beginning — God speaks reality into existence. The earth is תֹּהוּ וָבֹהוּ (tohu vavohu, formless and void) and darkness covers the face of the deep (תְּהוֹם). The רוּחַ אֱלֹהִים (Spirit/Wind of God) hovers over the waters like an eagle over its nest (Deut 32:11), poised to bring order from chaos. Creation begins not with conflict but with sovereign presence.',          day:'Prologue', c:'#3a4a6e' },
  { id:'g1_3',  l:'1:3-5',   sh:'1:3',  d:'Day 1 — God\'s first act is speech: יְהִי אוֹר ("Let there be light"). Light precedes the sun by three days, establishing that light flows from the divine word, not from created bodies. God separates light from darkness and names them — the first act of naming and distinction that structures all reality. Evening precedes morning: creation moves from darkness toward light, from chaos toward order.',   day:'Day 1',    c:'#3a4a6e' },
  { id:'g1_6',  l:'1:6-8',   sh:'1:6',  d:'Day 2 — God creates the רָקִיעַ (raqia, firmament/expanse), separating waters above from waters below. This cosmic architecture reframes ANE cosmology: the waters are not chaos-gods to be defeated but simply respond to divine command. The firmament is a vaulted canopy that makes habitable space possible — a cosmic temple ceiling under which life will flourish.',           day:'Day 2',    c:'#3a5a6e' },
  { id:'g1_9',  l:'1:9-13',  sh:'1:9',  d:'Day 3 — Two acts of creation: dry land emerges as waters are gathered, then vegetation springs forth "according to its kind" (לְמִינוֹ). The phrase "according to its kind" appears 10 times in Genesis 1, emphasizing ordered reproducibility and the goodness of distinct categories. Day 3 mirrors Day 6 in structure — both contain two creative acts, both end with "it was good." The pattern of separation and naming continues: seas and land receive names.',day:'Day 3',    c:'#3a6e4e' },
  { id:'g1_14', l:'1:14-19', sh:'1:14', d:'Day 4 — Sun, moon, and stars are created as governing lights (מְאֹרֹת) to rule day and night and to mark signs, seasons, days, and years. Crucially, they are not named — a pointed demotion of the celestial bodies worshipped as deities throughout the ANE (Shamash, Sin, Ishtar). They are servants of divine time, not objects of devotion. The greater and lesser lights govern but do not originate.',         day:'Day 4',    c:'#6e6a3a' },
  { id:'g1_20', l:'1:20-23', sh:'1:20', d:'Day 5 — Sea creatures and birds receive the first divine blessing: פְּרוּ וּרְבוּ ("Be fruitful and multiply"). This abundance-blessing echoes forward to humanity (1:28) and Noah\'s family (9:1). The תַּנִּינִם (great sea creatures) feared as chaos-monsters in Ugaritic mythology are simply God\'s creatures — created, blessed, and good. Creation is not a battle but an act of divine generosity.',      day:'Day 5',    c:'#3a5e6e' },
  { id:'g1_24', l:'1:24-25', sh:'1:24', d:'Day 6a — Land animals appear "according to their kinds": livestock, crawling things, and wild animals. The threefold categorization orders the animal world in relation to human habitation. No blessing is given yet — that awaits the crown of creation. The same God who named light and sky now populates the land with breathing creatures. They share the term נֶפֶשׁ חַיָּה (living being) with humanity, yet bear no divine image.',      day:'Day 6',    c:'#6e4a3a' },
  { id:'g1_26', l:'1:26-28', sh:'1:26', d:'Day 6b — The climax of creation: God deliberates ("Let us make") and forms אָדָם in his צֶלֶם (image) and דְּמוּת (likeness) — terms used in the ANE for royal statues that represent the king\'s presence in a territory. Humanity is God\'s living image, placed to represent his reign over creation. Male and female together bear this image; together they receive the mandate to rule (רָדָה) and subdue (כָּבַשׁ) — a royal-priestly vocation, not exploitation.',         day:'Day 6',    c:'#6e4a3a' },
  { id:'g1_29', l:'1:29-31', sh:'1:29', d:'Day 6c — God grants food: plants and fruit for humanity, green plants for animals — a pre-fall diet without predation or violence. Then God surveys the whole completed creation and declares it טוֹב מְאֹד (tov me\'od, "very good"). The superlative "very" appears only here; the entire inhabited, ordered, life-filled cosmos is given this singular, unrepeated evaluation. The world as God made it is not merely functional — it is lavishly, exuberantly good.',           day:'Day 6',    c:'#6e4a3a' },
  { id:'g2_1',  l:'2:1-3',   sh:'2:1',  d:'Day 7 — The Sabbath. God finishes (וַיְכַל) his work and rests (שָׁבַת), blessing the seventh day and making it קָדוֹשׁ (holy — set apart). Uniquely, no "evening and morning" closes this day: it remains open, an invitation to enter divine rest. The verb וַיְכַל echoes at the tabernacle\'s completion (Exod 40:33) and on the cross (John 19:30). Sabbath is not absence of activity but the sanctification of time — creation\'s crown is rest, not work.',  day:'Day 7',    c:'#5a3a6e' },
  { id:'g2_4',  l:'2:4-7',   sh:'2:4',  d:'The second creation account opens with תּוֹלְדוֹת (toledot, "these are the generations of") — the formula used for births throughout Genesis, as if heaven and earth have offspring. אָדָם is formed from אֲדָמָה (ground) — a wordplay that binds his identity to the earth. Then God breathes נִשְׁמַת חַיִּים (the breath of life) directly into his nostrils — an intimacy granted to no other creature — making him a נֶפֶשׁ חַיָּה (living being). The dust becomes a person by divine breath.',    day:'Adam',     c:'#6e5a3a' },
  { id:'g2_8',  l:'2:8-14',  sh:'2:8',  d:'Eden (עֵדֶן, "delight") is planted by God as a sanctuary where heaven and earth meet — a garden-temple. Four rivers flow from its single source to water the whole known world, placing Eden at the cosmic center. Gold, bdellium, and onyx mark its sacred character — the same materials later used in the tabernacle and temple. The tree of life and the tree of the knowledge of good and evil identify this space as morally charged: a place of vocation, relationship, and testing, not merely of beauty.',          day:'Eden',     c:'#3a6e5a' },
  { id:'g2_15', l:'2:15-17', sh:'2:15', d:'God places the man in Eden "to work it and keep it" — לְעָבְדָהּ וּלְשָׁמְרָהּ (avad and shamar). These precise two verbs appear together again only in priestly texts (Num 3:7-8; 18:7) describing Levitical service in the tabernacle, identifying Adam\'s vocation as priestly — a guardian of sacred space. The single prohibition frames the garden as covenantal: the command gives relationship structure. Death (מוֹת תָּמוּת) as consequence is not arbitrary punishment but the withdrawal of life from the only source of it.',day:'Command',  c:'#5a4a3a' },
  { id:'g2_18', l:'2:18-22', sh:'2:18', d:'The first thing declared לֹא טוֹב ("not good") in all creation is aloneness — even before the fall, the solitary human is incomplete. God creates woman as עֵזֶר כְּנֶגְדּוֹ (ezer kenegdo, "a helper corresponding to him"). Ezer is used elsewhere of God himself as Israel\'s helper (Ps 121:2; Deut 33:7), carrying no connotation of inferiority. The צֵלָע (rib/side) taken from the man suggests not hierarchy but solidarity — she is built from him to stand alongside him. The animal naming that precedes her arrival shows the man\'s incompleteness: no suitable counterpart found.',   day:'Woman',    c:'#6e3a5a' },
  { id:'g2_23', l:'2:23-25', sh:'2:23', d:'Adam\'s first words are poetry — a cry of joyful recognition: עֶצֶם מֵעֲצָמַי ("bone of my bones, flesh of my flesh"). The narrator draws the foundational conclusion: a man leaves father and mother and דָּבַק (cleaves/clings) to his wife — they become בָּשָׂר אֶחָד (one flesh). The word דָּבַק is the covenant-fidelity term used of Israel\'s clinging to God (Deut 10:20; 30:20). They are עֲרוּמִּים (naked) and לֹא יִתְבֹּשָׁשׁוּ (unashamed) — a state of total transparency, wholeness, and trust that the fall will shatter.',      day:'Marriage', c:'#6e3a4a' },
];

const TANAKH = [
  // === INTRA-GENESIS ===
  // Genesis 3 — The Fall
  { s:'g2_8',  t:'Gen 3',     c:'fall',     n:'The garden of delight becomes the arena of temptation and exile. The serpent\'s approach to the woman in the garden-sanctuary is a desecration of sacred space — a subversion of Adam\'s priestly calling to "keep" (shamar) it. The narrative of 3:1-24 directly reverses the creation order: what was "very good" unravels through disobedience.' },
  { s:'g2_15', t:'Gen 3',     c:'fall',     n:'The command not to eat (2:17) is directly violated. The tree of the knowledge of good and evil — the boundary marker of covenant — becomes the site of the primal transgression. The serpent\'s reframing ("you will be like God, knowing good and evil") twists the royal-priestly vocation into a grasping for autonomy outside of God.' },
  { s:'g2_23', t:'Gen 3',     c:'fall',     n:'Naked and unashamed (2:25) gives way immediately to eyes opened, shame, fig-leaf coverings, and hiding (3:7-10). The transparency of the one-flesh union is broken. God\'s question "Where are you?" is not a request for information but the ache of broken covenant relationship — the first evangelistic question in Scripture.' },
  { s:'g2_4',  t:'Gen 3',     c:'adam',     n:'"Dust you are, and to dust you shall return" (3:19) directly reverses the breath of life breathed into dust in 2:7. The man who became a living being by divine breath will return to the ground from which he was taken. Death is not merely biological cessation but the undoing of the intimate Creator-creature bond expressed in that first breath.' },
  { s:'g1_9',  t:'Gen 3',     c:'fall',     n:'Day 3\'s "good" vegetation — given freely for food — is now cursed: "thorns and thistles it shall bring forth for you" (3:17-18). The fruitful earth that responded obediently to God\'s word now resists human labor. The ground\'s curse is proportionate to the man\'s vocation: he was placed to work the garden; now that work becomes painful toil.' },
  { s:'g1_26', t:'Gen 3',     c:'image',    n:'The image-bearers, created to represent God\'s ruling presence in creation, are driven from God\'s presence (3:23-24). Cherubim — the guardians of divine space — now bar the way to the tree of life. The royal-priestly vocation is not abolished but exiled: humanity still bears the image (9:6) but now outside the sanctuary, east of Eden.' },

  // Genesis 6–9 — Flood as de-creation / re-creation
  { s:'g1_1',  t:'Gen 6–9',   c:'fall',     n:'The flood is the literary reversal of creation — tohu vavohu returns. The separation of waters established on Day 2 collapses: "the fountains of the great deep burst open and the windows of the heavens were opened" (7:11). What God had separated in creation is re-merged in judgment. The chaos beneath and above breaks through the order God had established.' },
  { s:'g1_6',  t:'Gen 6–9',   c:'fall',     n:'Day 2\'s firmament separated waters above from waters below. The flood undoes this: both the subterranean deep and the heavenly reservoirs open simultaneously (7:11). The structured cosmos reverts toward primordial ocean. The forty days and forty nights echo the six creation days — a deliberate uncreation through the same elemental forces God had ordered.' },
  { s:'g1_9',  t:'Gen 6–9',   c:'creation', n:'On the 150th day the waters recede and dry land reappears (8:13-14) — a precise replay of Day 3. The raven and dove sent out by Noah parallel the Spirit hovering over the waters in 1:2: both are agents of discernment between waters and land. When the dove returns with an olive leaf, a new creation is signaled: life has returned to the earth.' },
  { s:'g1_1',  t:'Gen 6–9',   c:'spirit',  n:'"God made a wind (רוּחַ) pass over the earth and the waters subsided" (8:1). The same רוּחַ אֱלֹהִים that hovered over the primordial waters now drives them back, re-enacting the first creation. The flood narrative is bookended by the divine breath: chaos gives way to order not through human effort but through the same sovereign Spirit.' },
  { s:'g1_20', t:'Gen 6–9',   c:'creation', n:'The animals emerge from the ark "according to their kinds" (8:19) — the exact phrase repeated in Genesis 1:21, 24-25. The post-flood world is a new creation restoring the ordered animal world. Noah\'s first act is to build an altar and offer sacrifices (8:20), re-establishing the worship that had been absent since the fall.' },

  // Genesis 5:29 — Lamech's prophecy over Noah
  { s:'g1_9',  t:'Gen 5:29',  c:'curse',    n:'Lamech names his son נֹחַ (Noah, "rest" or "comfort") with the prophetic declaration that Noah will bring "relief from our work and the painful toil of our hands caused by the ground the LORD has cursed." The wordplay connects נֹחַ to נָחַם (comfort/relieve). The cursed ground of Gen 3:17 is the specific referent — creation waits for a deliverer who will lift the Adamic curse.' },
  { s:'g2_4',  t:'Gen 5:29',  c:'curse',    n:'"Out of the ground that the LORD has cursed" (5:29) is a direct reference to 3:17: the ground cursed because of the man who was made from the ground. Lamech\'s lament spans the entire genealogy of Genesis 5: Adam\'s formation from the earth and God\'s breath now stands under the shadow of labor and death. Noah is hoped to be the one who will reverse what Adam set in motion.' },
  { s:'g2_15', t:'Gen 5:29',  c:'curse',    n:'"Relief from our work and the painful toil of our hands" (5:29) echoes 3:17-19\'s sentence: painful toil (עִצָּבוֹן) in work is the direct consequence of violating the garden command. The same Hebrew root for toil appears in both passages. The curse on human labor is not merely economic — it is relational, reflecting the broken bond between the image-bearer and the creation he was called to steward.' },

  // Genesis 8:21 — Promise not to curse again
  { s:'g1_9',  t:'Gen 8:21',  c:'curse',    n:'God smells the pleasing aroma of Noah\'s sacrifice and resolves: "I will never again curse the ground because of man, even though the inclination of the human heart is evil from youth" (8:21). The Adamic curse on the ground is not lifted — that waits for the new creation — but God commits to preserve creation\'s order despite ongoing human sin. Creation is given a reprieve, not a restoration.' },
  { s:'g1_29', t:'Gen 8:21',  c:'creation', n:'"While the earth remains, seedtime and harvest, cold and heat, summer and winter, day and night, shall not cease" (8:22). The creation rhythms established in Genesis 1 — seasons (Day 4), vegetation (Day 3), the alternation of day and night — are guaranteed as a covenant of common grace. These rhythms are not destroyed by the fall but preserved through divine mercy.' },
  { s:'g2_1',  t:'Gen 8:21',  c:'sabbath',  n:'The seasonal rhythms confirmed after the flood — day and night, summer and winter — echo the ordered time established on Day 4 and sanctified on Day 7. God\'s promise to preserve these rhythms is an implicit preservation of the Sabbath pattern embedded in creation itself. The world runs on God\'s clock, not humanity\'s.' },

  // Genesis 9:1-7 — Noahic Covenant
  { s:'g1_26', t:'Gen 9:1-7', c:'image',    n:'"Whoever sheds the blood of man, by man shall his blood be shed, for God made man in his own image" (9:6). The image of God (צֶלֶם אֱלֹהִים) is the explicit theological basis for the prohibition of murder. The image is not destroyed by the fall — 9:6 asserts it post-flood — but the image-bearer now needs legal protection. Dignity flows from creation, not achievement.' },
  { s:'g1_29', t:'Gen 9:1-7', c:'creation', n:'God expands the food provisions: "every moving thing that lives shall be food for you" (9:3), adding animals to the plants given in 1:29. This is the first time God permits meat-eating — the pre-fall vegetarian order is modified but not without constraint: blood must not be consumed (9:4), because blood is life, and life belongs to God. Creation\'s gifts come with covenant boundaries.' },
  { s:'g1_26', t:'Gen 9:1-7', c:'fruitful', n:'"Be fruitful and multiply and fill the earth" (9:1, 7) — the creation mandate of 1:28 is re-commissioned to Noah and his sons. The same three verbs (fruitful, multiply, fill) recur verbatim. After the flood\'s decimation, humanity is called back to its original vocation: to spread life across the earth as image-bearers of the Creator.' },

  // Patriarchal echoes
  { s:'g2_8',  t:'Gen 13:10', c:'eden',     n:'Lot surveys the Jordan valley and sees it is "well-watered, like the garden of the LORD, like the land of Egypt" (13:10). The Edenic comparison is explicit — a lush, river-watered landscape evoking the garden\'s four rivers. The irony is heavy: Lot chooses this paradise, but it contains Sodom. Eden-like beauty is no guarantee of covenant faithfulness.' },
  { s:'g1_26', t:'Gen 17:6',  c:'fruitful', n:'"I will make you exceedingly fruitful, and I will make you into nations, and kings shall come from you" (17:6). The creation blessing "be fruitful and multiply" is now channeled through one man, Abraham, to flow to all nations. The universal mandate of Genesis 1:28 becomes the Abrahamic particular — a specific family carrying the creation blessing for the whole world.' },
  { s:'g2_4',  t:'Gen 18:27', c:'adam',     n:'"Behold, I have undertaken to speak to the Lord, I who am but dust and ashes" (18:27). Abraham\'s intercessory posture echoes Adam\'s origin — formed from the dust (2:7). The patriarchal self-description is not self-deprecation but accurate theological anthropology: before the LORD, the creature made from earth is always humble dust.' },
  { s:'g1_26', t:'Gen 35:11', c:'fruitful', n:'"Be fruitful and multiply" spoken to Jacob at Bethel — the creation mandate re-commissioned to the patriarch. The same blessing given to Adam (1:28), renewed to Noah (9:1), and promised to Abraham (17:6) is now confirmed to Jacob, marking Bethel as a renewal of covenant and creation purpose.' },
  { s:'g1_26', t:'Gen 48:4',  c:'fruitful', n:'Jacob recounts to Joseph: "God said to me, I will make you fruitful and increase your numbers" — the creation blessing flows to the next generation through Joseph\'s sons. The fruitfulness mandate threads the entire patriarchal narrative, each generation receiving the commission that began in Genesis 1.' },

  // Exodus — creation theology
  { s:'g1_26', t:'Exod 1:7',  c:'fruitful', n:'Israel "was fruitful and increased greatly; they multiplied and grew exceedingly strong, so that the land was filled with them" (1:7). Five verbs pile on top of each other — an explicit allusion to the creation mandate. The nation of Israel is the fulfillment of the Abrahamic blessing which was itself the re-channeling of the original creation commission. The promised multiplication is happening — in Egypt, of all places.' },
  { s:'g1_1',  t:'Exod 14:21',c:'spirit',  n:'"The LORD drove the sea back by a strong east wind (רוּחַ קָדִים) all night and made the sea dry land" (14:21). The divine wind over the waters echoes the Spirit\'s creative hovering in 1:2. The same elemental forces — wind and water — that were the medium of first creation become the medium of the new exodus creation. Israel\'s liberation is a new Genesis.' },
  { s:'g1_9',  t:'Exod 14:21',c:'creation', n:'When the sea parts, dry ground (חָרָבָה) appears in the midst of water — a precise replay of Day 3 when dry land emerged from the gathered waters. The Israelites walk through on dry ground (14:22, 29), echoing the first creatures to walk on dry land. The Red Sea crossing is narrated with deliberate creation-day vocabulary to frame exodus as new creation.' },
  { s:'g2_1',  t:'Exod 16',   c:'sabbath',  n:'Manna in the wilderness teaches Israel the creation rhythm before they receive Sinai\'s Sabbath command. Double portions on the sixth day, none on the seventh — the pattern of Days 1-7 is enacted weekly in the desert. Israel learns to live on God\'s provision rather than their own labor, preparing their hearts for the covenant of rest.' },

  // Exodus 19:6
  { s:'g1_26', t:'Exod 19:6', c:'image',    n:'"You shall be to me a kingdom of priests (מַמְלֶכֶת כֹּהֲנִים) and a holy nation" (19:6). The royal-priestly vocation of the image-bearers in Genesis 1:26-28 is now explicitly commissioned to Israel as a nation. What Adam failed to fulfill as an individual, Israel is called to embody collectively — ruling wisely under God, mediating his presence to the nations around them.' },
  { s:'g2_15', t:'Exod 19:6', c:'temple',   n:'Adam\'s vocation to "work and keep" the garden-sanctuary (עָבַד וְשָׁמַר, 2:15) becomes the entire nation\'s calling. A whole people is commissioned as a priestly community — serving (עָבַד) at the sanctuary and guarding (שָׁמַר) the covenant. The garden-temple of Eden expands: it is no longer a single location but a people who carry God\'s presence.' },

  { s:'g2_1',  t:'Exod 20',   c:'sabbath',  n:'"For in six days the LORD made heaven and earth, the sea, and all that is in them, and rested on the seventh day. Therefore the LORD blessed the Sabbath day and made it holy" (20:11). The Sabbath command (the fourth word of the Decalogue) grounds Israel\'s weekly rest directly in the creation pattern of Genesis 1-2. Covenant ethics are rooted in creation theology.' },
  { s:'g1_1',  t:'Exod 20',   c:'creation', n:'Creation as the theological foundation of the Decalogue\'s fourth word — the Sabbath command appeals not to a legal precedent but to the cosmos itself. God\'s pattern of six days of work and one of rest is the permanent structure he wove into reality, making the Sabbath not a religious add-on but an echo of creation\'s own rhythm.' },
  { s:'g2_1',  t:'Exod 25–31',c:'temple',  n:'The tabernacle construction is narrated across seven divine speeches to Moses (25:1, 30:11, 30:17, 30:22, 30:34, 31:1, 31:12) — a deliberate parallel to the seven days of creation. As God spoke the world into existence, he speaks the tabernacle into being. The tabernacle is a micro-cosmos: the curtains recall the firmament, the menorah the tree of life, the cherubim the guardians of Eden.' },
  { s:'g2_8',  t:'Exod 25–31',c:'temple',  n:'The tabernacle\'s furnishings deliberately recall Eden: the menorah (lampstand) shaped as an almond tree with blossoms (25:31-40); cherubim on the ark and curtains (25:18-22; 26:31) — the same guardians that barred Eden\'s east gate (Gen 3:24); gold and precious stones (25:3, 7) matching Eden\'s gold and onyx (Gen 2:11-12). The tabernacle is Eden rebuilt, God\'s presence dwelling again among his people.' },
  { s:'g2_1',  t:'Exod 31:12-17',c:'sabbath',n:'"It is a sign forever between me and the people of Israel that in six days the LORD made heaven and earth, and on the seventh day he rested and was refreshed (וַיִּנָּפַשׁ)" (31:17). The Sabbath is the sign of the Sinai covenant — Israel\'s identity marker that points back to creation. The word וַיִּנָּפַשׁ (was refreshed/caught breath) is striking: God himself is described as needing a Sabbath breath.' },

  // Exodus 40 — tabernacle completion
  { s:'g2_1',  t:'Exod 40',  c:'temple',   n:'Moses "finished (וַיְכַל) the work" (40:33) — the same verb used when God "finished (וַיְכַל)" the creation in Gen 2:2. Then "the cloud covered the tent of meeting and the glory of the LORD filled the tabernacle" (40:34). As God rested in his completed creation, now his glory fills the completed sanctuary. The tabernacle is creation complete — a sacred space fully inhabited by divine presence.' },
  { s:'g1_1',  t:'Exod 40',  c:'temple',   n:'The cloud covered the tent and the glory of the LORD filled the tabernacle — divine presence inhabiting created sacred space exactly as the divine word once filled the formless void with light, order, and life. The same God who spoke creation into being now takes up residence in the micro-cosmos Israel has built.' },

  // Numbers
  { s:'g2_15', t:'Num 3:7-8', c:'temple',   n:'The Levites shall "guard (שָׁמַר) all the furnishings of the tent of meeting and keep guard over the people of Israel as they minister" (3:7). The two verbs — serve (עָבַד) and keep/guard (שָׁמַר) — are the exact pair used for Adam\'s vocation in the garden (2:15). The Levites are Israel\'s Adams, serving in the new Eden-sanctuary. The priestly calling is a restoration of the original human vocation.' },
  { s:'g1_3',  t:'Num 6:25',  c:'light',    n:'"The LORD make his face shine upon you and be gracious to you" (6:25) — the Aaronic blessing places the light of God\'s countenance at the center of priestly benediction. Day 1\'s light was not physical illumination but divine radiance — and here it is: God\'s shining face as the blessing that Israel carries into the world. The creation light becomes the covenant blessing.' },

  { s:'g2_1',  t:'Deut 5',    c:'sabbath',  n:'Deuteronomic Sabbath — creation and exodus woven together as the ground of rest' },

  { s:'g1_3',  t:'Isa 45',    c:'light',    n:'"I form light and create darkness" (45:7) — direct echo of Day 1' },
  { s:'g1_1',  t:'Isa 65',    c:'newcre',   n:'"Behold, I create new heavens and a new earth" — eschatological re-creation' },
  { s:'g2_8',  t:'Isa 65',    c:'eden',     n:'Wolf and lamb together — Edenic imagery of restored harmony' },

  { s:'g1_1',  t:'Ezek 37',  c:'spirit',   n:'Ezekiel commands the רוח from four winds — the Spirit that hovered over creation now re-creates Israel from death' },

  { s:'g2_4',  t:'Ps 104',    c:'spirit',  n:'"Take away their breath, they return to dust" (104:29) — reversing Gen 2:7' },

  { s:'g1_1',  t:'Job 38–41', c:'creation', n:'"Where were you when I laid the foundations of the earth?"' },
  { s:'g1_3',  t:'Job 38–41', c:'light',    n:'"Where is the way to the dwelling of light?"' },

  { s:'g1_9',  t:'Job 38–41', c:'creation', n:'"Thus far shall you come, and no further"' },
  { s:'g1_20', t:'Job 38–41', c:'creation', n:'Leviathan, Behemoth — the wild, untamable creation beyond human dominion' },

  { s:'g1_9',  t:'Prov 8',    c:'creation', n:'"When he assigned the sea its limit, marked foundations of the earth"' },
  { s:'g1_1',  t:'Neh 9:6',   c:'creation', n:'"You alone are the LORD — you made the heavens, the earth, the seas"' },

  { s:'g2_8',  t:'Ps 1:3',    c:'eden',     n:'"Tree planted by streams of water" (פַּלְגֵי מָיִם) — the righteous one as a new Adam in a new Eden' },
  { s:'g1_9',  t:'Ps 1:3',    c:'eden',     n:'"Yields fruit in season, leaf does not wither" — Day 3 vegetation flourishing by Eden\'s river' },
  { s:'g2_15', t:'Ps 1:3',    c:'wisdom',   n:'Torah-meditation produces life — Wisdom/Torah functions as a "tree of life," a redeemed path to life after exile from Eden' },

  { s:'g2_8',  t:'Prov 3:18', c:'wisdom',   n:'"She is a tree of life (עֵץ חַיִּים) to those who lay hold of her" — Wisdom grants what Eden barred' },
  { s:'g2_15', t:'Prov 3:18', c:'wisdom',   n:'Access to the tree of life, lost in Gen 3:24, is reopened through Wisdom — Torah as the path back to Eden' },

const NC = [
  // John
  { s:'g1_1',  t:'John 1:1-5',   c:'light',    n:'"In the beginning (ἐν ἀρχῇ) was the Word" — the opening three words of John\'s Gospel deliberately echo the opening three words of Genesis (בְּרֵאשִׁית). The Logos is not a new creation but the agent of all creation, present before time began. John frames the entire Gospel as a new Genesis: what God began through his Word in creation, he completes through his Word made flesh.' },
  { s:'g1_3',  t:'John 1:1-5',   c:'light',    n:'"The light shines in the darkness and the darkness has not overcome it" (1:5). Day 1\'s light-from-darkness becomes the controlling metaphor of John\'s entire Gospel. In Genesis, the darkness was the pre-creation void; in John, it is the world\'s resistance to the Creator who enters it. The verb κατέλαβεν (overcome/comprehend) is deliberately ambiguous — the darkness neither understood nor defeated the light.' },
  { s:'g1_1',  t:'John 1:1-5',   c:'creation', n:'"All things were made through him, and without him was not anything made that was made" (1:3). The double affirmation — all things through him, nothing without him — is the most comprehensive creation-agency statement in the NT. The Logos is the mediator of creation, not merely its origin. Paul says the same of Christ in Col 1:16; the NT writers form a consistent witness.' },
  { s:'g2_8',  t:'John 1:14',    c:'temple',   n:'"The Word became flesh and dwelt (ἐσκήνωσεν) among us" — the verb ἐσκήνωσεν (tabernacled, pitched his tent) is a deliberate allusion to the tabernacle (σκηνή). Jesus is the true tabernacle: God\'s glory dwelling in human flesh exactly as the Shekinah glory filled the wilderness sanctuary. John adds "we have seen his glory (δόξαν)" — the same glory that filled Exod 40:34-35.' },
  { s:'g1_1',  t:'John 1:14',    c:'creation', n:'"We have seen his glory" — the glory of God that was manifest in creation through the divine Word is now incarnate. The same Logos through whom all things were made (1:3) has entered the creation as its sustaining source, so that in seeing Jesus, the disciples saw the glory of the Creator himself made visible and tangible.' },
  { s:'g2_1',  t:'John 19:30',   c:'sabbath',  n:'"It is finished (τετέλεσται)" — Jesus\' final word from the cross is the Greek equivalent of the Hebrew וַיְכַל ("and he finished/completed") used when God finished creation in Gen 2:2 and when Moses finished the tabernacle in Exod 40:33. Jesus dies on the preparation day (Friday), rests in the tomb on the Sabbath, and rises on the first day — a three-day recapitulation of creation week\'s arc.' },
  { s:'g1_29', t:'John 19:30',   c:'creation', n:'Both mark completion of divine work — Genesis: creation surveyed and declared "very good" (1:31); John: redemption declared "finished" (19:30). The superlative "very good" of Day 6c finds its redemptive counterpart in the τετέλεσται of the cross: what was marred by the fall is now comprehensively addressed by the work of the last Adam.' },
  { s:'g2_4',  t:'John 20',      c:'spirit',   n:'Jesus breathed on the disciples and said "Receive the Holy Spirit" (20:22). The verb ἐνεφύσησεν (breathed into) appears only here in the NT — and in the LXX only at Gen 2:7, where God breathed the breath of life into Adam\'s nostrils. The new creation community receives its animating Spirit the same way the first human received life: by the direct breath of God.' },
  { s:'g1_3',  t:'John 20',      c:'newcre',   n:'The resurrection occurs on the first day of the week — Day 1 of the new creation dawns. John\'s careful temporal notation (20:1, "on the first day") is not accidental: just as the original creation began on Day 1 with light breaking into darkness, the new creation begins on Day 1 with the risen Christ appearing, himself the light of the world breaking out of death\'s tomb.' },
  { s:'g2_8',  t:'John 20',      c:'eden',     n:'Mary Magdalene, weeping at the empty tomb, mistakes the risen Jesus for the gardener (20:15). John almost certainly intends the irony: Jesus is the true gardener, the new Adam standing in a garden at the dawn of the new creation. The first Adam was placed in a garden to tend it; the last Adam rises in a garden to restore it. Creation\'s story has come full circle.' },

  // John 15 — True Vine
  { s:'g2_8',  t:'John 15:1-5',  c:'eden',     n:'"I am the true vine (ἄμπελος ἀληθινή)" — Jesus claims to be what Israel failed to be (Ps 80; Isa 5) and what Eden promised: the source of life-giving fruit. The vine imagery restores the garden: to abide in Jesus is to dwell in the new Eden, drawing life from the source rather than grasping autonomy from the tree of knowledge. The Father is the gardener — Eden\'s original keeper.' },
  { s:'g2_15', t:'John 15:1-5',  c:'wisdom',   n:'"Remain in me and I in you… apart from me you can do nothing" (15:4-5). Access to the tree of life — barred by the cherubim after the fall (Gen 3:24) — is reopened through union with Christ. The condition is not performance but abiding. What the first Adam lost by grasping (autonomy from God), the disciples of the last Adam recover by clinging (covenant fidelity).' },
  { s:'g1_9',  t:'John 15:1-5',  c:'eden',     n:'Day 3\'s vegetation bearing fruit "according to its kind" finds its fulfilment in the true vine: branches bear fruit only when connected to the vine. The creation order in which life-producing capacity is given from the source (God\'s word) is recapitulated in Jesus\' teaching — life, fruitfulness, and reproduction flow only from abiding in the source.' },
  { s:'g1_26', t:'John 15:1-5',  c:'adam',     n:'"Apart from me you can do nothing" — a direct reversal of Adam\'s attempt at autonomous knowledge and self-determination. The image-bearer\'s vocation was always to derive life and wisdom from God; the fall was the attempt to seize independence. Jesus calls his disciples back to the true Adamic posture: total dependence on the Creator for every act of fruitfulness.' },

  // Christological
  { s:'g1_26', t:'Col 1:15-17',  c:'image',    n:'"He is the image (εἰκών) of the invisible God, the firstborn of all creation" (1:15). εἰκών is the LXX word for the Hebrew צֶלֶם in Gen 1:26-27. Where humanity as a whole bears the image partially and faultily, Christ is the perfect image — the one in whom the divine likeness is fully and permanently expressed. He is what Adam was meant to be, and more.' },
  { s:'g1_1',  t:'Col 1:15-17',  c:'creation', n:'"For by him all things were created, in heaven and on earth, visible and invisible… all things were created through him and for him. And he is before all things, and in him all things hold together" (1:16-17). Paul piles up prepositional phrases: creation through Christ (agent), for Christ (goal), and in Christ (sustainer). The cosmos is not just made by him but held in coherence by him — an ongoing creational role.' },
  { s:'g1_1',  t:'Heb 1:1-3',    c:'creation', n:'"Through whom he made the worlds (αἰῶνας)" — the Son is the agent of creation across the ages. The author of Hebrews opens with a seven-fold description of the Son in which creation-agency is foundational: the one who speaks redemptively now is the same one through whom God first spoke the cosmos into being.' },
  { s:'g1_3',  t:'Heb 1:1-3',    c:'light',    n:'"The radiance (ἀπαύγασμα) of God\'s glory" — Day 1\'s light finds its Christological depth here. The Son is not merely a creature who reflects God\'s glory as a mirror; he is the radiance itself, the outshining of the divine nature. The light that was first spoken into the void is now personified in the one who upholds all things by his powerful word.' },
  { s:'g1_26', t:'Heb 1:1-3',    c:'image',    n:'"The exact representation (χαρακτήρ) of his being" — where Genesis speaks of humanity made in the divine image (צֶלֶם), Hebrews deepens the claim for the Son: he is not a copy but the very imprint. Humanity bears the image imperfectly; the Son is the image perfectly, the one in whom the character of God is exactly and completely expressed.' },
  { s:'g2_1',  t:'Heb 4',        c:'sabbath',  n:'"So then, there remains a Sabbath rest (σαββατισμός) for the people of God" (4:9). The author of Hebrews reads God\'s rest on Day 7 as an invitation still open: the Sabbath of Gen 2:1-3 was never closed with "evening and morning," meaning God\'s rest is an ongoing reality into which believers may enter through faith. Jesus is the Sabbath: rest found in him, not in a day.' },
  { s:'g1_1',  t:'Heb 11:3',     c:'creation', n:'"By faith we understand that the worlds were framed by the word of God, so that what is seen was not made from things that are visible." The Genesis account of creation-by-speech becomes the paradigm of faith: trusting an invisible Creator whose word is the only explanation for visible reality. Creation ex nihilo is itself a faith claim — the starting point of the whole biblical story.' },
  { s:'g1_3',  t:'Heb 11:3',     c:'light',    n:'"What is seen was not made from what is visible" — this is creation ex nihilo applied as an epistemological principle. As Day 1 produced light from nothing visible, faith grasps what is real but unseen. The creation of light before any created light-source illustrates the pattern: God\'s word precedes and produces the material order, not the reverse.' },

  // Soteriological
  { s:'g1_3',  t:'2 Cor 4:6',    c:'light',    n:'"For God, who said \'Let light shine out of darkness\' (Gen 1:3), has shone in our hearts to give the light of the knowledge of the glory of God in the face of Jesus Christ." Paul explicitly cites the Day 1 creation word as the paradigm for conversion. The same divine speech-act that created light from nothing creates saving knowledge from spiritual darkness. Regeneration is a new creation.' },
  { s:'g1_26', t:'2 Cor 4:6',    c:'image',    n:'"The light of the knowledge of the glory of God in the face of Jesus Christ" — image and glory converge. The divine image (Gen 1:26-27) was the vehicle for divine glory in creation; now the face of Christ is where that glory is perfectly beheld. The believer who receives this light is being renewed into the image of the one who bears the perfect image.' },
  { s:'g1_1',  t:'2 Cor 5:17',   c:'newcre',   n:'"If anyone is in Christ, new creation (καινὴ κτίσις)! The old has passed away; the new has come." The declaration has cosmic scope: Paul does not say "new creature" (individual) but "new creation" (cosmic order). Union with Christ locates the believer inside the new Genesis. The "old" is not merely personal sin but the entire fallen order inaugurated by Adam; the "new" is the restored creation begun in the resurrection.' },
  { s:'g2_4',  t:'2 Cor 5:17',   c:'newcre',   n:'"The old has passed; the new has come" — the dust-to-glory transformation. The man formed from ground (2:7) who through the fall returned to dust (3:19) is re-created in Christ. The new creation is not a second creation ex nihilo but the resurrection-transformation of the old, as the last Adam\'s new-creation life begins to penetrate and renew the Adamic order.' },
  { s:'g1_1',  t:'Rom 1:20',     c:'creation', n:'"God\'s invisible attributes — his eternal power and divine nature — have been clearly seen from the creation of the world, being understood through what has been made." Paul grounds natural revelation in Genesis 1: the visible creation communicates the invisible Creator. The ordered cosmos that God declared "good" was always designed to point beyond itself to its Maker.' },
  { s:'g1_14', t:'Rom 1:20',     c:'creation', n:'The celestial order — sun, moon, stars governing time and season (Day 4) — is Paul\'s primary exhibit for natural revelation. The creation that was not named (to avoid celestial deity worship) is the very creation that points unmistakably to the one divine Creator. Suppressing this knowledge is the root of idolatry: trading the Creator for the creature.' },

  // Adam typology
  { s:'g2_4',  t:'Rom 5:12-21',  c:'adam',     n:'"Therefore, just as sin came into the world through one man, and death through sin, and so death spread to all men because all sinned" (5:12). Adam is the head of a humanity-in-solidarity with him — his act had cosmic consequences because he was not merely an individual but the representative of all humanity. Paul\'s argument requires that Adam was a historical individual whose act had genuine federal consequences.' },
  { s:'g1_26', t:'Rom 5:12-21',  c:'image',    n:'Death reigned from Adam — the image-bearer became the death-bringer. Grace abounds "much more" (5:15, 17, 20): the contrast Paul draws is between what the first image-bearer brought (death-reign) and what the last Adam brings (life-reign). The image of God, now perfectly expressed in Christ, becomes the vehicle through which the abundance of grace and righteousness flows.' },
  { s:'g2_15', t:'Rom 5:12-21',  c:'adam',     n:'The transgression of the command at the tree of knowledge (2:15-17) and its cosmic consequence — death spreading to all — is the anchor of Paul\'s argument. The single prohibition given in the garden was not arbitrary; its violation had universal scope because the man who transgressed was the representative head of all humanity. The garden command was always a covenant boundary.' },
  { s:'g1_1',  t:'Rom 8:19-22',  c:'newcre',   n:'"Creation waits with eager longing for the revealing of the sons of God… subjected to futility… in bondage to decay." The cosmos that God declared "very good" (1:31) now groans under the consequences of the fall. Paul personalizes creation\'s longing: the same world that received God\'s blessing in Genesis 1 is the same world that will share in the liberation of God\'s renewed image-bearers.' },
  { s:'g1_29', t:'Rom 8:19-22',  c:'newcre',   n:'From "very good" (1:31) to "bondage to decay" (8:21) — the trajectory of creation under the curse. But the groaning is anticipatory, not terminal. Creation\'s subjection to futility was not its final state but a temporary condition awaiting the redemption of the sons of God. The creation mandate of Genesis 1:28 will be fully restored when the image-bearers are fully renewed.' },
  { s:'g1_26', t:'1 Cor 11:7',   c:'image',    n:'"Man is the image and glory of God" — Paul grounds his argument in Genesis 1:26-27. The image of God is not merely a theological concept but a lived reality that structures human identity, relationship, and worship. The glory of God expressed through the image-bearer at creation is the theological bedrock of Paul\'s entire discussion of head-covering in corporate worship.' },
  { s:'g2_18', t:'1 Cor 11:7',   c:'marriage', n:'"Woman is the glory of man" — Paul grounds the creation order of Genesis 2:18-22 in his argument. The formation of woman from man ("woman from man," 11:8) and the purpose of her creation ("woman for man," 11:9) are presented as the theological basis for the practice at issue. Creation order shapes covenant community.' },
  { s:'g2_4',  t:'1 Cor 15:45',  c:'adam',     n:'"The first Adam became a living being (ψυχὴν ζῶσαν — Gen 2:7 LXX); the last Adam became a life-giving spirit." Paul quotes Gen 2:7 directly, identifying Jesus as the second and last Adam. Where the first Adam received life (passive), the last Adam gives life (active). Where the first Adam\'s breath came from outside (God breathed into him), the last Adam is himself the source of Spirit-life for others.' },
  { s:'g1_26', t:'1 Cor 15:45',  c:'image',    n:'"Just as we have borne the image of the man of dust, we shall also bear the image of the man of heaven" (15:49). The image of God — borne imperfectly in the Adamic order — will be fully and permanently realized in the resurrection. The creation mandate to bear and display the divine image reaches its eschatological completion when the redeemed are conformed to the risen Christ.' },

  // Marriage
  { s:'g2_23', t:'Eph 5:31-32',  c:'marriage', n:'"Therefore a man shall leave his father and mother and hold fast to his wife, and the two shall become one flesh (Gen 2:24). This mystery is profound, and I am saying that it refers to Christ and the church." Paul reads the one-flesh union of Gen 2 as a mystery (μυστήριον) — a hidden meaning now revealed. Marriage was always designed as an enacted parable of Christ\'s covenant love for his people.' },
  { s:'g2_18', t:'Eph 5:31-32',  c:'marriage', n:'The self-giving love of the last Adam for his bride — nourishing and cherishing (5:29) — models what the first Adam failed to provide: a husband who protects and sustains rather than passively permitting harm. The mystery of marriage is finally legible only in light of Christ\'s sacrifice, which reveals what the one-flesh union of Genesis 2 was always pointing toward.' },
  { s:'g1_26', t:'Matt 19:4-6',  c:'marriage', n:'"He who made them from the beginning made them male and female" — Jesus quotes Gen 1:27, grounding the indissolubility of marriage in creation order. The Pharisees appeal to Mosaic law; Jesus appeals to a prior and deeper authority: the Creator\'s intention written into the structure of humanity itself. Creation theology is Jesus\'s hermeneutic for marriage ethics.' },
  { s:'g2_23', t:'Matt 19:4-6',  c:'marriage', n:'"The two shall become one flesh… What God has joined together, let not man separate" — Jesus quotes Gen 2:24 as the permanent standard. The one-flesh union is not a social convention to be revised by human legislation but a divine action (God joined them) rooted in creation order. Jesus restores marriage to its Edenic design by overriding the Mosaic concession.' },
  { s:'g1_26', t:'Mark 10:6',    c:'marriage', n:'"From the beginning of creation, God made them male and female" — Mark\'s version of Jesus\'s appeal to Gen 1:27. The phrase "from the beginning of creation" anchors marriage in the original creative order, not in any subsequent cultural arrangement. Jesus\'s ethics of marriage are creation-ethics, not merely Torah-ethics.' },
  { s:'g2_23', t:'Mark 10:6',    c:'marriage', n:'"What God has joined together, let not man separate" — the creation-order argument of Gen 2:24 stands as Jesus\'s final word on divorce. The one-flesh union is God\'s doing; its dissolution is human presumption. Mark\'s abbreviated account highlights the stark creation-vs-human-legislation contrast that Jesus draws.' },
  { s:'g2_4',  t:'1 Tim 2:13',   c:'adam',     n:'"Adam was formed first, then Eve" — Paul appeals to the sequence of creation in Genesis 2:7, 22. The temporal priority of Adam\'s formation is the basis of the argument. Interpretation of the precise scope and application of this principle is debated in biblical scholarship, but the appeal to creation order as theologically normative is clear.' },
  { s:'g2_18', t:'1 Tim 2:13',   c:'marriage', n:'The formation of woman from and after man (Gen 2:18-22) is presented as establishing a creation order that Paul treats as having ongoing instructional significance. Whatever the precise application, Paul\'s hermeneutic consistently grounds church practice in Genesis 1-2, treating creation order as a theological constant rather than a cultural variable.' },
  { s:'g1_29', t:'1 Tim 4:4',    c:'creation', n:'"Everything created by God is good, and nothing is to be rejected if it is received with thanksgiving" — a direct echo of the "good" and "very good" refrain of Genesis 1. Paul cites creation-goodness against ascetic restrictions on food and marriage. The theological ground is clear: what God made in creation and declared good remains good; the problem is not matter but misuse.' },
  { s:'g1_9',  t:'1 Tim 4:4',    c:'creation', n:'Food given by God — received with thanksgiving, not rejected. Day 3\'s vegetation and Day 6\'s provision of food (1:29-30) established that the material creation including food is God\'s good gift. Paul\'s counter to food-asceticism is the creation narrative itself: the God who gave food and declared it good has not reversed that verdict.' },

  // Eschatological
  { s:'g2_8',  t:'Rev 21–22',    c:'eden',     n:'The new Jerusalem descends from heaven containing the tree of life (22:2) and the river of life (22:1) — a direct restoration of Eden\'s tree and rivers. The angel shows John "the river of the water of life, bright as crystal, flowing from the throne of God and of the Lamb, through the middle of the street of the city; also, on either side of the river, the tree of life." Eden is not merely restored — it is glorified and made permanent.' },
  { s:'g1_1',  t:'Rev 21–22',    c:'newcre',   n:'"Behold, I am making all things new" (21:5). The new creation of Rev 21-22 is not the annihilation of the old but its transformation and renewal — the same cosmos liberated from its bondage to decay (Rom 8:21). The new heavens and new earth are the fulfillment of the creation project begun in Gen 1: God finally dwelling fully and permanently with his image-bearers, with no serpent, no curse, no night.' },
  { s:'g1_3',  t:'Rev 21–22',    c:'light',    n:'"And night will be no more. They will need no light of lamp or sun, for the Lord God will be their light, and they will reign forever and ever" (22:5). Day 1\'s light — which preceded the sun — finds its final form here: the uncreated light of God himself replacing all derivative light sources. The creation order of separating light from darkness is transcended: there will simply be light, always and only.' },
  { s:'g2_1',  t:'Rev 21–22',    c:'temple',   n:'"God\'s dwelling (σκηνή) is with man, and he will dwell with them" (21:3). The new creation needs no temple, for the Lord God Almighty and the Lamb are its temple (21:22). The garden-sanctuary of Eden, the tabernacle, the temple — all were anticipations of this: the complete and permanent indwelling of God with his people, the creation project finally fulfilled.' },
  { s:'g1_26', t:'Rev 21–22',    c:'image',    n:'"They will see his face (22:4) … and they will reign forever and ever" (22:5). The royal-priestly vocation of Gen 1:26-28 — to bear the image and exercise dominion — reaches its full realization. Redeemed humanity will reign not merely over the earth but "forever and ever," as co-rulers with the Lamb. The image-bearing mandate is not abolished by redemption; it is perfected and glorified.' },
  { s:'g2_15', t:'Rev 21–22',    c:'wisdom',   n:'"The tree of life bearing twelve crops of fruit, yielding its fruit every month; the leaves of the tree are for the healing of the nations" (22:2). Access to the tree of life — barred by cherubim in Gen 3:24 — is finally, permanently restored. What Wisdom promised as a "tree of life" (Prov 3:18), what the righteous longed for (Ps 1:3), is now given freely in the new Jerusalem to all who enter.' },
  { s:'g1_9',  t:'Rev 21–22',    c:'curse',    n:'"No longer will there be anything accursed (22:3)" — the Greek πᾶν κατάθεμα directly reverses the curse of Gen 3:17. The thorns and thistles, the painful toil, the enmity with the ground — all of it is finally and permanently lifted. The tree of life bears fruit every month (22:2), and its leaves are "for the healing of the nations." Creation\'s fruitfulness is fully restored.' },

  // Revelation — Royal Priesthood
  { s:'g1_26', t:'Rev 1:6',      c:'image',    n:'"Made us a kingdom, priests to his God" — the image-bearing vocation of Gen 1:26-28 restored through redemption' },
  { s:'g2_15', t:'Rev 1:6',      c:'temple',   n:'Priestly service (עבד ושמר) that began in Eden and passed to the Levites now belongs to all the redeemed' },
  { s:'g1_26', t:'Rev 5:10',     c:'image',    n:'"You made them a kingdom and priests… and they shall reign on the earth" — dominion mandate fulfilled in the Lamb' },
  { s:'g2_4',  t:'Rev 5:10',     c:'adam',     n:'Ransomed "from every tribe and language and people and nation" — the Adamic unity of Gen 2:7 redeemed from Babel\'s scattering' },

  // 1 Peter — flood typology
  { s:'g1_6',  t:'1 Pet 3:20-21',c:'creation', n:'Noah saved "through water" — flood waters that destroyed become the waters of baptism that save' },
  { s:'g1_1',  t:'1 Pet 3:20-21',c:'spirit',   n:'Baptism as passing through water into new life — as creation emerged from the deep by the Spirit' },

  { s:'g1_1',  t:'2 Pet 3:5',    c:'creation', n:'"Heavens existed long ago; earth formed out of water by God\'s word"' },
  { s:'g1_6',  t:'2 Pet 3:5',    c:'creation', n:'Water cosmology — creation/flood link; the world deluged, reserved for fire' },
  { s:'g1_1',  t:'Acts 17:24',   c:'creation', n:'"God who made the world and everything in it" — Paul at the Areopagus' },
  { s:'g2_4',  t:'Acts 17:24',   c:'adam',     n:'"From one man he made every nation" — Adamic unity of humanity' },
  { s:'g1_26', t:'Acts 17:24',   c:'image',    n:'"In him we live and move and have our being" — creature-Creator bond' },
];

// ===== ENGINE =====
// Architecture: draw() rebuilds SVG once (tab change / catFilter change).
// applyHighlight() mutates existing element attributes — NO innerHTML rebuild.

// Split TaNaKh into its three canonical divisions
const TORAH_BOOKS   = TANAKH_BOOKS.slice(0, 21);  // Gen 3 → Deut 5
const NEVIIM_BOOKS  = TANAKH_BOOKS.slice(21, 31); // Isa 40 → 1 Kgs 8
const KETUVIM_BOOKS = TANAKH_BOOKS.slice(31);     // Ps 1:3 → Amos 4:13

let tab = 'tanakh';
let locked = null;
let hovered = null;
let catFilter = null;

function getBooks() {
  if (tab==='torah')   return TORAH_BOOKS;
  if (tab==='neviim')  return NEVIIM_BOOKS;
  if (tab==='ketuvim') return KETUVIM_BOOKS;
  if (tab==='tanakh')  return TANAKH_BOOKS;
  return NC_BOOKS;
}
function getConns() { return tab==='nc' ? NC : TANAKH; }
function getAccent() {
  if (tab==='torah')   return 'var(--torahB)';
  if (tab==='neviim')  return 'var(--neviimB)';
  if (tab==='ketuvim') return 'var(--ketuvimB)';
  if (tab==='nc')      return 'var(--ncB)';
  return 'var(--tanakhB)';
}
function getTabLabel() {
  if (tab==='torah')   return 'Torah · Instruction';
  if (tab==='neviim')  return "Nevi\u02bcim · Prophets";
  if (tab==='ketuvim') return 'Ketuvim · Writings';
  if (tab==='tanakh')  return 'TaNaKh · Torah · Nevi\u02bcim · Ketuvim';
  return 'New Covenant';
}

// ── Derived state helpers ─────────────────────────────────────────────────────
function activeState() {
  const src = locked || hovered;
  return src ? { aId: src.id, aType: src.type, aCi: src.ci ?? null } : {};
}

// ── Info panel ────────────────────────────────────────────────────────────────
function clrInfo() {
  const e = document.getElementById('info');
  e.className = 'info empty';
  e.querySelector('.t').textContent = 'Select a Genesis section or book to explore';
  e.querySelector('.b').innerHTML = '';
}

function shInfo(title, count, html) {
  const e = document.getElementById('info');
  e.className = 'info';
  e.querySelector('.t').innerHTML = title + `<span class="cnt">${count} connection${count!==1?'s':''}</span>`;
  e.querySelector('.b').innerHTML = html;
}

function infoSrc(id) {
  const seg = S.find(s => s.id === id);
  const books = getBooks();
  const all = getConns().filter(c=>c.s===id && books.includes(c.t));
  const f = catFilter ? all.filter(c=>c.c===catFilter) : all;
  shInfo(`Genesis ${seg.l}`, f.length,
    `<div style="margin-bottom:3px;color:var(--tx-d);font-size:.78rem;font-style:italic">${seg.d}</div>`
    + (f.map(c=>`<span class="h">${c.t}</span> · ${c.n}`).join('<br>')||'<em style="color:var(--tx-d)">No connections in current filter</em>'));
}

function infoTgt(id) {
  const all = getConns().filter(c=>c.t===id);
  const f = catFilter ? all.filter(c=>c.c===catFilter) : all;
  shInfo(id, f.length,
    f.map(c=>{const seg=S.find(s=>s.id===c.s);return `<span class="h">Gen ${seg?.l}</span> · ${c.n}`;}).join('<br>')
    ||'<em style="color:var(--tx-d)">No connections in current filter</em>');
}

function infoArc(conn) {
  if (!conn) return;
  const seg = S.find(s=>s.id===conn.s);
  const cat = CAT[conn.c];
  shInfo(`Gen ${seg.l} → ${conn.t}`, 1,
    `<div style="margin-bottom:4px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${cat.color};margin-right:6px;vertical-align:middle"></span><span style="color:${cat.color};font-weight:600">${cat.label}</span></div>`
    +`<div style="margin-bottom:3px;color:var(--tx-d);font-size:.78rem;font-style:italic">${seg.d}</div>${conn.n}`);
}

// ── Highlight — mutates existing DOM, no innerHTML ────────────────────────────
function applyHighlight() {
  const area = document.getElementById('svg-area');
  if (!area.querySelector('svg')) return;

  const books = getBooks();
  const conns = getConns();
  const fc = catFilter
    ? conns.filter(c=>c.c===catFilter && books.includes(c.t))
    : conns.filter(c=>books.includes(c.t));
  const accent = getAccent();
  const { aId, aType, aCi } = activeState();
  const anyActive = aId != null || aCi != null;

  // ── Arcs ──
  area.querySelectorAll('.arc').forEach(el => {
    const ci = parseInt(el.dataset.ci);
    const conn = fc[ci];
    if (!conn) return;
    const isAct = (aCi === ci) ||
                  (aType==='source' && conn.s===aId) ||
                  (aType==='target' && conn.t===aId);
    let op, sw;
    if (anyActive) { op=isAct?.88:.04; sw=isAct?3:.7; }
    else { op=.18; sw=1.2; }
    el.setAttribute('opacity', op);
    el.setAttribute('stroke-width', sw);
    if (isAct && anyActive) el.setAttribute('filter','url(#gl)');
    else el.removeAttribute('filter');
  });

  // ── Genesis segments ──
  area.querySelectorAll('.seg').forEach(el => {
    const id = el.dataset.id;
    const isAct = aType==='source' && aId===id;
    const isCon = aType==='target' && fc.some(c=>c.s===id && c.t===aId);
    const isArcSrc = aCi !== null && fc[aCi] && fc[aCi].s===id;
    const highlighted = isAct || isCon || isArcSrc;
    const dim = anyActive && !highlighted;
    const rect = el.querySelector('rect');
    const txt  = el.querySelector('text');
    if (rect) {
      rect.setAttribute('fill-opacity', dim?.2:(highlighted?1:.55));
      rect.setAttribute('stroke', highlighted?'var(--gold-b)':'transparent');
      rect.setAttribute('stroke-width', highlighted?2:0);
    }
    if (txt) txt.setAttribute('fill', highlighted?'#fff':(dim?'rgba(255,255,255,.25)':'rgba(255,255,255,.7)'));
  });

  // ── Target labels ──
  area.querySelectorAll('.tgt').forEach(el => {
    const id = el.dataset.id;
    const isAct = aType==='target' && aId===id;
    const isCon = aType==='source' && fc.some(c=>c.t===id && c.s===aId);
    const isArcTgt = aCi !== null && fc[aCi] && fc[aCi].t===id;
    const highlighted = isAct || isCon || isArcTgt;
    const dim = anyActive && !highlighted;
    let fc2, op;
    if (highlighted) { fc2=accent; op=1; }
    else if (dim) { fc2='var(--tx-d)'; op=.3; }
    else { fc2='var(--tx)'; op=.8; }
    el.setAttribute('opacity', op);
    el.querySelectorAll('text').forEach(t=>t.setAttribute('fill', fc2));
    el.querySelectorAll('line').forEach(l=>l.setAttribute('stroke', fc2));
  });
}

// ── Full rebuild — only on init / tab switch / catFilter change ───────────────
function draw() {
  const books = getBooks();
  const conns = getConns();
  const accent = getAccent();
  const area = document.getElementById('svg-area');

  const W = tab==='tanakh'
    ? Math.max(1100, books.length * 36)   // tighter spacing for full TaNaKh view
    : Math.max(820, books.length * 44);
  const ML=44, MR=44, barY=58, barH=34, arcZone=360;
  const targetY = barY+barH+arcZone;
  const H = targetY+88;
  const segW = (W-ML-MR)/S.length;

  const sp = S.map((s,i)=>({...s, x:ML+i*segW, cx:ML+i*segW+segW/2, w:segW}));
  const ts = (W-ML-MR)/books.length;
  const tp = books.map((b,i)=>({id:b, cx:ML+i*ts+ts/2}));

  const fc = catFilter
    ? conns.filter(c=>c.c===catFilter && books.includes(c.t))
    : conns.filter(c=>books.includes(c.t));
  const sc={}, tc={};
  fc.forEach(c=>{sc[c.s]=(sc[c.s]||0)+1; tc[c.t]=(tc[c.t]||0)+1;});

  let v=`<svg class="chart" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;
  v+=`<defs><filter id="gl"><feGaussianBlur stdDeviation="2" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;

  // Gen label
  v+=`<text x="${ML-6}" y="${barY+barH/2+1}" text-anchor="end" font-family="Cormorant Garamond,serif" font-size="12" font-weight="600" fill="var(--gold-d)" dominant-baseline="middle">Gen</text>`;

  // Bar bg
  v+=`<rect x="${ML}" y="${barY}" width="${W-ML-MR}" height="${barH}" rx="4" fill="#1a1d28" stroke="rgba(186,163,112,.15)" stroke-width=".5"/>`;

  // Target bar labels
  if (tab === 'tanakh') {
    // Three division labels spaced over their respective book groups
    const torahTp   = tp.slice(0, TORAH_BOOKS.length);
    const neviimTp  = tp.slice(TORAH_BOOKS.length, TORAH_BOOKS.length + NEVIIM_BOOKS.length);
    const ketuvimTp = tp.slice(TORAH_BOOKS.length + NEVIIM_BOOKS.length);

    const torahMid   = (torahTp[0].cx   + torahTp[torahTp.length-1].cx)   / 2;
    const neviimMid  = (neviimTp[0].cx  + neviimTp[neviimTp.length-1].cx) / 2;
    const ketuvimMid = (ketuvimTp[0].cx + ketuvimTp[ketuvimTp.length-1].cx) / 2;

    v+=`<text x="${torahMid}"   y="${targetY-16}" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="10" fill="var(--tx-d)" font-weight="600" letter-spacing=".08em">TORAH</text>`;
    v+=`<text x="${neviimMid}"  y="${targetY-16}" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="10" fill="var(--tx-d)" font-weight="600" letter-spacing=".08em">NEVI\u02bcIM</text>`;
    v+=`<text x="${ketuvimMid}" y="${targetY-16}" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="10" fill="var(--tx-d)" font-weight="600" letter-spacing=".08em">KETUVIM</text>`;

    // Dashed dividers between divisions
    [TORAH_BOOKS.length, TORAH_BOOKS.length + NEVIIM_BOOKS.length].forEach(di => {
      const x = (tp[di-1].cx + tp[di].cx) / 2;
      v+=`<line x1="${x}" y1="${targetY-28}" x2="${x}" y2="${targetY}" stroke="rgba(186,163,112,.18)" stroke-width="1" stroke-dasharray="3,3"/>`;
    });
  } else {
    const labelMid = (tp[0].cx + tp[tp.length-1].cx) / 2;
    v+=`<text x="${labelMid}" y="${targetY-16}" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="10" fill="var(--tx-d)" font-weight="600" letter-spacing=".08em">${getTabLabel().toUpperCase()}</text>`;
  }

  // Arcs — render at neutral opacity; applyHighlight() will adjust
  const arcPaths=[];
  fc.forEach((conn,ci)=>{
    const src=sp.find(s=>s.id===conn.s), tgt=tp.find(t=>t.id===conn.t);
    if(!src||!tgt) return;
    const x1=src.cx,y1=barY+barH,x2=tgt.cx,y2=targetY;
    const cat=CAT[conn.c], dist=Math.abs(x2-x1);
    const dir=x2>x1?1:(x2<x1?-1:(ci%2===0?1:-1));
    const minBow=45, bow=dist<minBow*2?(minBow-dist/2)*dir:0;
    const cp1x=x1+(x2-x1)*0.3+bow*0.6, cp1y=y1+arcZone*0.32;
    const cp2x=x2-(x2-x1)*0.3-bow*0.6, cp2y=y2-arcZone*0.32;
    const pathD=`M${x1},${y1} C${cp1x},${cp1y} ${cp2x},${cp2y} ${x2},${y2}`;
    arcPaths.push({ci,pathD,conn});
    // data-ci lets applyHighlight find this arc without rebuilding
    v+=`<path class="arc" data-ci="${ci}" d="${pathD}" stroke="${cat.color}" stroke-width="1.2" opacity=".18"/>`;
  });

  // Arc hit areas on top
  arcPaths.forEach(({ci,pathD})=>{
    v+=`<path class="arc-hit" data-ci="${ci}" d="${pathD}"/>`;
  });

  // Genesis segments — neutral state; applyHighlight adjusts
  const fs=segW>52?10:(segW>40?9:7.5);
  sp.forEach(seg=>{
    const cnt=sc[seg.id]||0;
    v+=`<g class="seg" data-id="${seg.id}" style="cursor:pointer">`;
    v+=`<rect x="${seg.x+.5}" y="${barY+.5}" width="${seg.w-1}" height="${barH-1}" rx="3" fill="${seg.c}" fill-opacity=".55" stroke="transparent" stroke-width="0"/>`;
    v+=`<text x="${seg.cx}" y="${barY+barH/2+3.5}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="${fs}" font-weight="600" fill="rgba(255,255,255,.7)">${seg.sh}</text>`;
    if(cnt>0&&segW>35){
      v+=`<circle cx="${seg.x+seg.w-8}" cy="${barY+7}" r="6" fill="rgba(0,0,0,.5)" stroke="var(--gold-d)" stroke-width=".5"/>`;
      v+=`<text x="${seg.x+seg.w-8}" y="${barY+10}" text-anchor="middle" font-size="7" font-weight="600" fill="var(--gold)" font-family="DM Sans">${cnt}</text>`;
    }
    v+=`</g>`;
  });

  // Day labels
  let ld='';
  sp.forEach(seg=>{
    if(seg.day!==ld){
      ld=seg.day;
      const ds=sp.filter(s=>s.day===seg.day);
      const mx=(ds[0].x+ds[ds.length-1].x+ds[ds.length-1].w)/2;
      v+=`<text x="${mx}" y="${barY-8}" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="9" fill="var(--tx-d)" font-style="italic">${seg.day}</text>`;
    }
  });

  // Target labels — neutral; applyHighlight adjusts
  tp.forEach(tgt=>{
    const cnt=tc[tgt.id]||0;
    v+=`<g class="tgt" data-id="${tgt.id}" style="cursor:pointer" opacity=".8">`;
    v+=`<line x1="${tgt.cx}" y1="${targetY}" x2="${tgt.cx}" y2="${targetY+5}" stroke="var(--tx)" stroke-width="1.5"/>`;
    if(cnt>0){
      v+=`<circle cx="${tgt.cx}" cy="${targetY-6}" r="7" fill="rgba(0,0,0,.6)" stroke="var(--tx-d)" stroke-width=".5"/>`;
      v+=`<text x="${tgt.cx}" y="${targetY-3}" text-anchor="middle" font-size="7" font-weight="600" fill="var(--tx-d)" font-family="DM Sans">${cnt}</text>`;
    }
    v+=`<text x="${tgt.cx}" y="${targetY+11}" text-anchor="start" transform="rotate(52,${tgt.cx},${targetY+11})" font-size="11" fill="var(--tx)" font-family="Cormorant Garamond,serif" font-weight="400">${tgt.id}</text>`;
    v+=`</g>`;
  });

  v+=`</svg>`;
  area.innerHTML=v;

  // ── Attach events ONCE after build ────────────────────────────────────────
  // Arc hit areas
  area.querySelectorAll('.arc-hit').forEach(el=>{
    const ci=parseInt(el.dataset.ci);
    const conn=fc[ci];
    el.addEventListener('mouseenter',()=>{
      if(locked) return;
      hovered={type:'arc',id:null,ci};
      infoArc(conn);
      applyHighlight();
    });
    el.addEventListener('mouseleave',()=>{
      if(locked) return;
      hovered=null;
      clrInfo();
      applyHighlight();
    });
    el.addEventListener('click',e=>{
      e.stopPropagation();
      // clicking an arc locks/unlocks it
      if(locked&&locked.type==='arc'&&locked.ci===ci){locked=null;clrInfo();}
      else{locked={type:'arc',id:null,ci};infoArc(conn);}
      hovered=null;
      applyHighlight();
    });
  });

  // Genesis segments
  area.querySelectorAll('.seg').forEach(el=>{
    const id=el.dataset.id;
    el.addEventListener('mouseenter',()=>{
      if(locked) return;
      hovered={type:'source',id};
      infoSrc(id);
      applyHighlight();
    });
    el.addEventListener('mouseleave',()=>{
      if(locked) return;
      hovered=null;
      clrInfo();
      applyHighlight();
    });
    el.addEventListener('click',e=>{
      e.stopPropagation();
      if(locked&&locked.type==='source'&&locked.id===id){locked=null;clrInfo();}
      else{locked={type:'source',id};infoSrc(id);}
      hovered=null;
      applyHighlight();
    });
  });

  // Target labels
  area.querySelectorAll('.tgt').forEach(el=>{
    const id=el.dataset.id;
    el.addEventListener('mouseenter',()=>{
      if(locked) return;
      hovered={type:'target',id};
      infoTgt(id);
      applyHighlight();
    });
    el.addEventListener('mouseleave',()=>{
      if(locked) return;
      hovered=null;
      clrInfo();
      applyHighlight();
    });
    el.addEventListener('click',e=>{
      e.stopPropagation();
      if(locked&&locked.type==='target'&&locked.id===id){locked=null;clrInfo();}
      else{locked={type:'target',id};infoTgt(id);}
      hovered=null;
      applyHighlight();
    });
  });

  // Click on SVG background to clear lock
  area.addEventListener('click',()=>{
    if(locked){locked=null;hovered=null;clrInfo();applyHighlight();}
  });

  // Legend rebuild — only categories present in this tab's connections
  const uc=new Set(fc.map(c=>c.c));
  const le=document.getElementById('legend');
  le.innerHTML='';
  for(const [k,v2] of Object.entries(CAT)){
    if(!uc.has(k)) continue;
    const d=document.createElement('div');
    d.className='leg';
    const iF=catFilter===k;
    d.innerHTML=`<span class="dot" style="background:${v2.color};${iF?'box-shadow:0 0 6px '+v2.color:''}"></span><span style="${iF?'color:var(--tx-b)':''}">${v2.label}</span>`;
    d.addEventListener('click',()=>{ catFilter=catFilter===k?null:k; locked=null; hovered=null; clrInfo(); draw(); });
    le.appendChild(d);
  }

  // Apply any persisted locked state after rebuild
  applyHighlight();
  if(locked){
    if(locked.type==='source') infoSrc(locked.id);
    else if(locked.type==='target') infoTgt(locked.id);
    else if(locked.type==='arc') infoArc(fc[locked.ci]);
  }
}

function go(t) {
  tab=t; locked=null; hovered=null; catFilter=null;
  const ids = ['t-tanakh','t-torah','t-neviim','t-ketuvim','t-nc'];
  ids.forEach(id=>{
    const el=document.getElementById(id);
    if (!el) return;
    const key = id.replace('t-','');
    let cls = 'tbtn';
    if (key === t) {
      if (t==='tanakh') cls='tbtn active-t';
      else if (t==='nc') cls='tbtn active-nc';
      else cls=`tbtn a-${t}`;
    }
    el.className = cls;
  });
  clrInfo(); draw();
}

// Touch support
document.addEventListener('touchstart',e=>{
  const sg=e.target.closest('.seg'), tg=e.target.closest('.tgt'), ah=e.target.closest('.arc-hit');
  if(sg){
    e.preventDefault();
    const id=sg.dataset.id;
    if(locked&&locked.type==='source'&&locked.id===id){locked=null;clrInfo();}
    else{locked={type:'source',id};infoSrc(id);}
    hovered=null; applyHighlight();
  } else if(tg){
    e.preventDefault();
    const id=tg.dataset.id;
    if(locked&&locked.type==='target'&&locked.id===id){locked=null;clrInfo();}
    else{locked={type:'target',id};infoTgt(id);}
    hovered=null; applyHighlight();
  } else if(!e.target.closest('.leg')&&!e.target.closest('.tbtn')){
    locked=null; hovered=null; clrInfo(); applyHighlight();
  }
},{passive:false});

draw();
</script>
