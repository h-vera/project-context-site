// ===== ENGINE =====
// Architecture: draw() rebuilds SVG once (tab change / catFilter change).
// applyHighlight() mutates existing element attributes — NO innerHTML rebuild —
// so the DOM stays stable and mouseenter/mouseleave never fire spuriously.

let tab = 'tanakh';
let locked = null;       // { type:'source'|'target'|'arc', id, ci? }
let hovered = null;      // same shape, transient
let catFilter = null;

// ── Derived state helpers ─────────────────────────────────────────────────────
function activeState() {
  const src = locked || hovered;
  return src ? { aId: src.id, aType: src.type, aCi: src.ci ?? null } : {};
}

// ── Info panel ────────────────────────────────────────────────────────────────
function clrInfo() {
  const e = document.getElementById('info');
  e.className = 'info empty';
  e.querySelector('.t').textContent = 'Select a Genesis section or book to explore';
  e.querySelector('.b').innerHTML = '';
}

function shInfo(title, count, html) {
  const e = document.getElementById('info');
  e.className = 'info';
  e.querySelector('.t').innerHTML = title + `<span class="cnt">${count} connection${count!==1?'s':''}</span>`;
  e.querySelector('.b').innerHTML = html;
}

function infoSrc(id) {
  const seg = S.find(s => s.id === id);
  const all = (tab==='tanakh'?TANAKH:NC).filter(c=>c.s===id);
  const f = catFilter ? all.filter(c=>c.c===catFilter) : all;
  shInfo(`Genesis ${seg.l}`, f.length,
    `<div style="margin-bottom:3px;color:var(--tx-d);font-size:.78rem;font-style:italic">${seg.d}</div>`
    + (f.map(c=>`<span class="h">${c.t}</span> · ${c.n}`).join('<br>')||'<em style="color:var(--tx-d)">No connections in current filter</em>'));
}

function infoTgt(id) {
  const all = (tab==='tanakh'?TANAKH:NC).filter(c=>c.t===id);
  const f = catFilter ? all.filter(c=>c.c===catFilter) : all;
  shInfo(id, f.length,
    f.map(c=>{const seg=S.find(s=>s.id===c.s);return `<span class="h">Gen ${seg?.l}</span> · ${c.n}`;}).join('<br>')
    ||'<em style="color:var(--tx-d)">No connections in current filter</em>');
}

function infoArc(conn) {
  if (!conn) return;
  const seg = S.find(s=>s.id===conn.s);
  const cat = CAT[conn.c];
  shInfo(`Gen ${seg.l} → ${conn.t}`, 1,
    `<div style="margin-bottom:4px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${cat.color};margin-right:6px;vertical-align:middle"></span><span style="color:${cat.color};font-weight:600">${cat.label}</span></div>`
    +`<div style="margin-bottom:3px;color:var(--tx-d);font-size:.78rem;font-style:italic">${seg.d}</div>${conn.n}`);
}

// ── Highlight — mutates existing DOM, no innerHTML ────────────────────────────
function applyHighlight() {
  const area = document.getElementById('svg-area');
  if (!area.querySelector('svg')) return;

  const conns = tab==='tanakh'?TANAKH:NC;
  const fc = catFilter ? conns.filter(c=>c.c===catFilter) : conns;
  const accent = tab==='tanakh'?'var(--tanakhB)':'var(--ncB)';
  const { aId, aType, aCi } = activeState();
  const anyActive = aId != null || aCi != null;

  // ── Arcs ──
  area.querySelectorAll('.arc').forEach(el => {
    const ci = parseInt(el.dataset.ci);
    const conn = fc[ci];
    if (!conn) return;
    const isAct = (aCi === ci) ||
                  (aType==='source' && conn.s===aId) ||
                  (aType==='target' && conn.t===aId);
    let op, sw;
    if (anyActive) { op=isAct?.88:.04; sw=isAct?3:.7; }
    else { op=.18; sw=1.2; }
    el.setAttribute('opacity', op);
    el.setAttribute('stroke-width', sw);
    if (isAct && anyActive) el.setAttribute('filter','url(#gl)');
    else el.removeAttribute('filter');
  });

  // ── Genesis segments ──
  area.querySelectorAll('.seg').forEach(el => {
    const id = el.dataset.id;
    const isAct = aType==='source' && aId===id;
    const isCon = aType==='target' && fc.some(c=>c.s===id && c.t===aId);
    const isArcSrc = aCi !== null && fc[aCi] && fc[aCi].s===id;
    const highlighted = isAct || isCon || isArcSrc;
    const dim = anyActive && !highlighted;
    const rect = el.querySelector('rect');
    const txt  = el.querySelector('text');
    if (rect) {
      rect.setAttribute('fill-opacity', dim?.2:(highlighted?1:.55));
      rect.setAttribute('stroke', highlighted?'var(--gold-b)':'transparent');
      rect.setAttribute('stroke-width', highlighted?2:0);
    }
    if (txt) txt.setAttribute('fill', highlighted?'#fff':(dim?'rgba(255,255,255,.25)':'rgba(255,255,255,.7)'));
  });

  // ── Target labels ──
  area.querySelectorAll('.tgt').forEach(el => {
    const id = el.dataset.id;
    const isAct = aType==='target' && aId===id;
    const isCon = aType==='source' && fc.some(c=>c.t===id && c.s===aId);
    const isArcTgt = aCi !== null && fc[aCi] && fc[aCi].t===id;
    const highlighted = isAct || isCon || isArcTgt;
    const dim = anyActive && !highlighted;
    let fc2, op;
    if (highlighted) { fc2=accent; op=1; }
    else if (dim) { fc2='var(--tx-d)'; op=.3; }
    else { fc2='var(--tx)'; op=.8; }
    el.setAttribute('opacity', op);
    el.querySelectorAll('text').forEach(t=>t.setAttribute('fill', fc2));
    el.querySelectorAll('line').forEach(l=>l.setAttribute('stroke', fc2));
  });
}

// ── Full rebuild — only on init / tab switch / catFilter change ───────────────
function draw() {
  const books = tab==='tanakh'?TANAKH_BOOKS:NC_BOOKS;
  const conns = tab==='tanakh'?TANAKH:NC;
  const accent = tab==='tanakh'?'var(--tanakhB)':'var(--ncB)';
  const area = document.getElementById('svg-area');

  const W = Math.max(1100, books.length * 50);
  const ML=44, MR=44, barY=58, barH=34, arcZone=360;
  const targetY = barY+barH+arcZone;
  const H = targetY+88;
  const segW = (W-ML-MR)/S.length;

  const sp = S.map((s,i)=>({...s, x:ML+i*segW, cx:ML+i*segW+segW/2, w:segW}));
  const ts = (W-ML-MR)/books.length;
  const tp = books.map((b,i)=>({id:b, cx:ML+i*ts+ts/2}));

  const fc = catFilter?conns.filter(c=>c.c===catFilter):conns;
  const sc={}, tc={};
  conns.forEach(c=>{sc[c.s]=(sc[c.s]||0)+1; tc[c.t]=(tc[c.t]||0)+1;});

  let v=`<svg class="chart" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;
  v+=`<defs><filter id="gl"><feGaussianBlur stdDeviation="2" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;

  // Gen label
  v+=`<text x="${ML-6}" y="${barY+barH/2+1}" text-anchor="end" font-family="Cormorant Garamond,serif" font-size="12" font-weight="600" fill="var(--gold-d)" dominant-baseline="middle">Gen</text>`;

  // Bar bg
  v+=`<rect x="${ML}" y="${barY}" width="${W-ML-MR}" height="${barH}" rx="4" fill="#1a1d28" stroke="rgba(186,163,112,.15)" stroke-width=".5"/>`;

  // Section labels
  if (tab==='tanakh') {
    const torahEnd=books.indexOf('Deut 5'), prophetsStart=books.indexOf('Isa 40');
    const prophetsEnd=books.indexOf('1 Kgs 8'), writingsStart=books.indexOf('Ps 1:3');
    if (torahEnd>=0&&prophetsStart>=0) {
      const m=(tp[0].cx+tp[torahEnd].cx)/2;
      v+=`<text x="${m}" y="${targetY-16}" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="10" fill="var(--tx-d)" font-weight="600" letter-spacing=".08em">TORAH</text>`;
    }
    if (prophetsStart>=0&&prophetsEnd>=0) {
      const m=(tp[prophetsStart].cx+tp[prophetsEnd].cx)/2;
      v+=`<text x="${m}" y="${targetY-16}" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="10" fill="var(--tx-d)" font-weight="600" letter-spacing=".08em">NEVI'IM</text>`;
    }
    if (writingsStart>=0) {
      const m=(tp[writingsStart].cx+tp[tp.length-1].cx)/2;
      v+=`<text x="${m}" y="${targetY-16}" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="10" fill="var(--tx-d)" font-weight="600" letter-spacing=".08em">KETUVIM</text>`;
    }
  }

  // Arcs — render at neutral opacity; applyHighlight() will adjust
  const arcPaths=[];
  fc.forEach((conn,ci)=>{
    const src=sp.find(s=>s.id===conn.s), tgt=tp.find(t=>t.id===conn.t);
    if(!src||!tgt) return;
    const x1=src.cx,y1=barY+barH,x2=tgt.cx,y2=targetY;
    const cat=CAT[conn.c], dist=Math.abs(x2-x1);
    const dir=x2>x1?1:(x2<x1?-1:(ci%2===0?1:-1));
    const minBow=45, bow=dist<minBow*2?(minBow-dist/2)*dir:0;
    const cp1x=x1+(x2-x1)*0.3+bow*0.6, cp1y=y1+arcZone*0.32;
    const cp2x=x2-(x2-x1)*0.3-bow*0.6, cp2y=y2-arcZone*0.32;
    const pathD=`M${x1},${y1} C${cp1x},${cp1y} ${cp2x},${cp2y} ${x2},${y2}`;
    arcPaths.push({ci,pathD,conn});
    // data-ci lets applyHighlight find this arc without rebuilding
    v+=`<path class="arc" data-ci="${ci}" d="${pathD}" stroke="${cat.color}" stroke-width="1.2" opacity=".18"/>`;
  });

  // Arc hit areas on top
  arcPaths.forEach(({ci,pathD})=>{
    v+=`<path class="arc-hit" data-ci="${ci}" d="${pathD}"/>`;
  });

  // Genesis segments — neutral state; applyHighlight adjusts
  const fs=segW>52?10:(segW>40?9:7.5);
  sp.forEach(seg=>{
    const cnt=sc[seg.id]||0;
    v+=`<g class="seg" data-id="${seg.id}" style="cursor:pointer">`;
    v+=`<rect x="${seg.x+.5}" y="${barY+.5}" width="${seg.w-1}" height="${barH-1}" rx="3" fill="${seg.c}" fill-opacity=".55" stroke="transparent" stroke-width="0"/>`;
    v+=`<text x="${seg.cx}" y="${barY+barH/2+3.5}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="${fs}" font-weight="600" fill="rgba(255,255,255,.7)">${seg.sh}</text>`;
    if(cnt>0&&segW>35){
      v+=`<circle cx="${seg.x+seg.w-8}" cy="${barY+7}" r="6" fill="rgba(0,0,0,.5)" stroke="var(--gold-d)" stroke-width=".5"/>`;
      v+=`<text x="${seg.x+seg.w-8}" y="${barY+10}" text-anchor="middle" font-size="7" font-weight="600" fill="var(--gold)" font-family="DM Sans">${cnt}</text>`;
    }
    v+=`</g>`;
  });

  // Day labels
  let ld='';
  sp.forEach(seg=>{
    if(seg.day!==ld){
      ld=seg.day;
      const ds=sp.filter(s=>s.day===seg.day);
      const mx=(ds[0].x+ds[ds.length-1].x+ds[ds.length-1].w)/2;
      v+=`<text x="${mx}" y="${barY-8}" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="9" fill="var(--tx-d)" font-style="italic">${seg.day}</text>`;
    }
  });

  // Target labels — neutral; applyHighlight adjusts
  tp.forEach(tgt=>{
    const cnt=tc[tgt.id]||0;
    v+=`<g class="tgt" data-id="${tgt.id}" style="cursor:pointer" opacity=".8">`;
    v+=`<line x1="${tgt.cx}" y1="${targetY}" x2="${tgt.cx}" y2="${targetY+5}" stroke="var(--tx)" stroke-width="1.5"/>`;
    if(cnt>0){
      v+=`<circle cx="${tgt.cx}" cy="${targetY-6}" r="7" fill="rgba(0,0,0,.6)" stroke="var(--tx-d)" stroke-width=".5"/>`;
      v+=`<text x="${tgt.cx}" y="${targetY-3}" text-anchor="middle" font-size="7" font-weight="600" fill="var(--tx-d)" font-family="DM Sans">${cnt}</text>`;
    }
    v+=`<text x="${tgt.cx}" y="${targetY+11}" text-anchor="start" transform="rotate(52,${tgt.cx},${targetY+11})" font-size="11" fill="var(--tx)" font-family="Cormorant Garamond,serif" font-weight="400">${tgt.id}</text>`;
    v+=`</g>`;
  });

  v+=`</svg>`;
  area.innerHTML=v;

  // ── Attach events ONCE after build ────────────────────────────────────────
  // Arc hit areas
  area.querySelectorAll('.arc-hit').forEach(el=>{
    const ci=parseInt(el.dataset.ci);
    const conn=fc[ci];
    el.addEventListener('mouseenter',()=>{
      if(locked) return;
      hovered={type:'arc',id:null,ci};
      infoArc(conn);
      applyHighlight();
    });
    el.addEventListener('mouseleave',()=>{
      if(locked) return;
      hovered=null;
      clrInfo();
      applyHighlight();
    });
    el.addEventListener('click',e=>{
      e.stopPropagation();
      // clicking an arc locks/unlocks it
      if(locked&&locked.type==='arc'&&locked.ci===ci){locked=null;clrInfo();}
      else{locked={type:'arc',id:null,ci};infoArc(conn);}
      hovered=null;
      applyHighlight();
    });
  });

  // Genesis segments
  area.querySelectorAll('.seg').forEach(el=>{
    const id=el.dataset.id;
    el.addEventListener('mouseenter',()=>{
      if(locked) return;
      hovered={type:'source',id};
      infoSrc(id);
      applyHighlight();
    });
    el.addEventListener('mouseleave',()=>{
      if(locked) return;
      hovered=null;
      clrInfo();
      applyHighlight();
    });
    el.addEventListener('click',e=>{
      e.stopPropagation();
      if(locked&&locked.type==='source'&&locked.id===id){locked=null;clrInfo();}
      else{locked={type:'source',id};infoSrc(id);}
      hovered=null;
      applyHighlight();
    });
  });

  // Target labels
  area.querySelectorAll('.tgt').forEach(el=>{
    const id=el.dataset.id;
    el.addEventListener('mouseenter',()=>{
      if(locked) return;
      hovered={type:'target',id};
      infoTgt(id);
      applyHighlight();
    });
    el.addEventListener('mouseleave',()=>{
      if(locked) return;
      hovered=null;
      clrInfo();
      applyHighlight();
    });
    el.addEventListener('click',e=>{
      e.stopPropagation();
      if(locked&&locked.type==='target'&&locked.id===id){locked=null;clrInfo();}
      else{locked={type:'target',id};infoTgt(id);}
      hovered=null;
      applyHighlight();
    });
  });

  // Click on SVG background to clear lock
  area.addEventListener('click',()=>{
    if(locked){locked=null;hovered=null;clrInfo();applyHighlight();}
  });

  // Legend rebuild
  const uc=new Set(conns.map(c=>c.c));
  const le=document.getElementById('legend');
  le.innerHTML='';
  for(const [k,v2] of Object.entries(CAT)){
    if(!uc.has(k)) continue;
    const d=document.createElement('div');
    d.className='leg';
    const iF=catFilter===k;
    d.innerHTML=`<span class="dot" style="background:${v2.color};${iF?'box-shadow:0 0 6px '+v2.color:''}"></span><span style="${iF?'color:var(--tx-b)':''}">${v2.label}</span>`;
    d.addEventListener('click',()=>{ catFilter=catFilter===k?null:k; locked=null; hovered=null; clrInfo(); draw(); });
    le.appendChild(d);
  }

  // Apply any persisted locked state after rebuild
  applyHighlight();
  if(locked){
    if(locked.type==='source') infoSrc(locked.id);
    else if(locked.type==='target') infoTgt(locked.id);
    else if(locked.type==='arc') infoArc(fc[locked.ci]);
  }
}

function go(t) {
  tab=t; locked=null; hovered=null; catFilter=null;
  document.getElementById('t-tanakh').className=t==='tanakh'?'tbtn a-tanakh':'tbtn';
  document.getElementById('t-nc').className=t==='nc'?'tbtn a-nc':'tbtn';
  clrInfo(); draw();
}

// Touch support
document.addEventListener('touchstart',e=>{
  const sg=e.target.closest('.seg'), tg=e.target.closest('.tgt'), ah=e.target.closest('.arc-hit');
  if(sg){
    e.preventDefault();
    const id=sg.dataset.id;
    if(locked&&locked.type==='source'&&locked.id===id){locked=null;clrInfo();}
    else{locked={type:'source',id};infoSrc(id);}
    hovered=null; applyHighlight();
  } else if(tg){
    e.preventDefault();
    const id=tg.dataset.id;
    if(locked&&locked.type==='target'&&locked.id===id){locked=null;clrInfo();}
    else{locked={type:'target',id};infoTgt(id);}
    hovered=null; applyHighlight();
  } else if(!e.target.closest('.leg')&&!e.target.closest('.tbtn')){
    locked=null; hovered=null; clrInfo(); applyHighlight();
  }
},{passive:false});

draw();
</script>
</body>
</html>
