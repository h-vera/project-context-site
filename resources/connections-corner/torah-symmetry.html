// ═══════ ENGINE ═══════
let tab = 'all', locked = null, hovered = null;

function fp() {
  if(tab==='ad')  return PAIRS.filter(p=>p.pair==='ad');
  if(tab==='en')  return PAIRS.filter(p=>p.pair==='en');
  if(tab==='lev') return PAIRS.filter(p=>p.pair==='lev');
  return PAIRS;
}
function fb() {
  if(tab==='ad')  return BOOKS.filter(b=>b.pair==='ad');
  if(tab==='en')  return BOOKS.filter(b=>b.pair==='en');
  if(tab==='lev') return BOOKS.filter(b=>b.pair==='lev');
  return BOOKS;
}

// ── Info panel helpers ──────────────────────────
function clrInfo() {
  const e=document.getElementById('info');
  e.className='info empty';
  e.querySelector('.t').textContent='Select a Torah book or parallel theme to explore';
  e.querySelector('.b').innerHTML='';
}

function refsHtml(refsStr, color) {
  if(!refsStr) return '';
  return `<div class="refs"><span class="rl">Key Texts</span><span class="rv" style="color:${color}">${refsStr}</span></div>`;
}

function pbHtml(letter, bookName, label, refsStr, bodyText, color) {
  return `<div class="pb" style="border-left-color:${color}">
    <div class="pl" style="color:${color}">${letter} · ${bookName} — ${label}</div>
    ${refsHtml(refsStr, color)}
    <div class="body">${bodyText}</div>
  </div>`;
}

function whyHtml(text) {
  if(!text) return '';
  return `<div class="why"><span class="wl">Why it matters</span><span>${text}</span></div>`;
}

function showBook(bid) {
  const book=BOOKS.find(b=>b.id===bid);
  const pairs=fp().filter(p=>p.book===bid);
  const e=document.getElementById('info');
  e.className='info';
  e.querySelector('.t').innerHTML=`<span style="color:${book.cb}">${book.letter}</span> · ${book.l}`;
  const html=pairs.map(p=>`
    <div class="pb" style="border-left-color:${book.cb}">
      <div class="pl" style="color:${book.cb}">${p.label}</div>
      ${refsHtml(p.refs, book.cb)}
      <div class="body">${p.own.substring(0,200)}${p.own.length>200?'…':''}</div>
    </div>`).join('') || `<em style="color:var(--tx-d)">No parallels in current filter.</em>`;
  e.querySelector('.b').innerHTML=html;
}

function showTarget(pid) {
  const pair=PAIRS.find(p=>p.id===pid);
  const book=BOOKS.find(b=>b.id===pair.book);
  const letters={'ad':['A','A′'],'en':['B','B′'],'lev':['C','']};
  const [la,lb]=letters[pair.pair]||['',''];
  const mirrorBook=pair.pair==='ad'
    ?(pair.book==='gen'?BOOKS.find(b=>b.id==='deut'):BOOKS.find(b=>b.id==='gen'))
    :pair.pair==='en'
    ?(pair.book==='exod'?BOOKS.find(b=>b.id==='num'):BOOKS.find(b=>b.id==='exod'))
    :null;

  const e=document.getElementById('info');
  e.className='info';
  e.querySelector('.t').innerHTML=pair.label+(pair.mlabel?` <span style="color:var(--tx-d);font-size:.8rem">↔ ${pair.mlabel}</span>`:'');

  let html=pbHtml(la, book.l, pair.label, pair.refs, pair.own, book.cb);
  if(pair.ml && mirrorBook) {
    html+=pbHtml(lb, mirrorBook.l, pair.mlabel, pair.mrefs, pair.ml, mirrorBook.cb);
  }
  html+=whyHtml(pair.n);
  e.querySelector('.b').innerHTML=html;
}

// ── Active state ────────────────────────────────
function activeId(){ const s=locked||hovered; return s?s.id:null; }
function activeType(){ const s=locked||hovered; return s?s.type:null; }

function mirrorId(pid) {
  if(!pid) return null;
  const p=PAIRS.find(x=>x.id===pid);
  if(!p) return null;
  const num=pid.slice(1);
  if(p.pair==='ad') return (pid[0]==='g')?'d'+num:'g'+num;
  if(p.pair==='en') return (pid[0]==='e')?'n'+num:'e'+num;
  return null;
}

// ── Highlight ───────────────────────────────────
function applyHighlight() {
  const area=document.getElementById('svg-area');
  if(!area.querySelector('svg')) return;
  const aid=activeId(), atype=activeType();
  const anyActive=aid!=null;
  const mid=atype==='target'?mirrorId(aid):null;

  area.querySelectorAll('.arc').forEach(el=>{
    const pid=el.dataset.pid, bid=el.dataset.bid;
    const isLev=(PAIRS.find(p=>p.id===pid)||{}).pair==='lev';
    const act=(atype==='book'&&bid===aid)||(atype==='target'&&(pid===aid||pid===mid));
    let op,sw;
    if(anyActive){ op=act?.92:.04; sw=act?(isLev?3.5:2.8):.7; }
    else { op=isLev?.32:.18; sw=isLev?2.2:1.2; }
    el.setAttribute('opacity',op);
    el.setAttribute('stroke-width',sw);
    if(act&&anyActive) el.setAttribute('filter','url(#gl)');
    else if(isLev&&!anyActive) el.setAttribute('filter','url(#levglow)');
    else el.removeAttribute('filter');
  });

  area.querySelectorAll('.bk-seg').forEach(el=>{
    const bid=el.dataset.bid;
    const curFp=fp();
    const isCon=atype==='target'&&curFp.some(p=>(p.id===aid||p.id===mid)&&p.book===bid);
    const isAct=atype==='book'&&bid===aid;
    const hl=isAct||isCon;
    const dim=anyActive&&!hl;
    const isLev=bid==='lev';
    const rect=el.querySelector('rect');
    const txt=el.querySelector('text');
    if(rect){
      rect.setAttribute('fill-opacity',dim?.12:hl?.95:(isLev?.7:.55));
      rect.setAttribute('stroke',hl?'var(--gold-b)':(isLev?'rgba(200,160,224,.45)':'transparent'));
      rect.setAttribute('stroke-width',hl?2.5:(isLev?1.5:0));
    }
    if(txt)txt.setAttribute('fill',hl?'#fff':(dim?'rgba(255,255,255,.18)':'rgba(255,255,255,.78)'));
  });

  area.querySelectorAll('.tgt-g').forEach(el=>{
    const pid=el.dataset.pid, bid=el.dataset.bid;
    const isAct=atype==='target'&&(pid===aid||pid===mid);
    const isCon=atype==='book'&&bid===aid;
    const hl=isAct||isCon;
    const dim=anyActive&&!hl;
    el.setAttribute('opacity',hl?1:dim?.14:.75);
    const book=BOOKS.find(b=>b.id===bid);
    el.querySelectorAll('text').forEach(t=>t.setAttribute('fill',hl?book.cb:(dim?'var(--tx-d)':'var(--tx)')));
    el.querySelectorAll('line').forEach(l=>l.setAttribute('stroke',hl?book.cb:'var(--tx-d)'));
  });
}

// ── Draw SVG ────────────────────────────────────
function draw() {
  const curFp=fp(), curFb=fb();
  const area=document.getElementById('svg-area');

  const ML=44, MR=44;
  const barY=68, barH=40;
  // Leviticus gets 6px taller on top
  const LEV_EXTRA=6;
  const arcZone=300;
  const targetY=barY+barH+arcZone;
  const H=targetY+92;

  const tc=curFp.length;
  const tSpacing=Math.max(50,(820-ML-MR)/Math.max(tc,1));
  const W=Math.max(820,ML+MR+tc*tSpacing);

  const bkW=(W-ML-MR)/BOOKS.length;
  const bkPos=BOOKS.map((b,i)=>({...b,x:ML+i*bkW,cx:ML+i*bkW+bkW/2,w:bkW}));
  const tPos=curFp.map((p,i)=>({...p,cx:ML+i*tSpacing+tSpacing/2}));

  let v=`<svg class="chart" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;
  v+=`<defs>
    <filter id="gl"><feGaussianBlur stdDeviation="2.5" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="levglow"><feGaussianBlur stdDeviation="3" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="levBg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="rgba(200,160,224,.10)"/>
      <stop offset="100%" stop-color="rgba(200,160,224,0)"/>
    </radialGradient>
  </defs>`;

  // Lev background glow in arc zone (only when lev is in scope)
  const levBk=bkPos.find(b=>b.id==='lev');
  if(levBk && (tab==='all'||tab==='lev')) {
    v+=`<ellipse cx="${levBk.cx}" cy="${barY+barH+arcZone*.45}" rx="${bkW*1.8}" ry="${arcZone*.55}" fill="url(#levBg)"/>`;
  }

  // Bar background
  v+=`<rect x="${ML}" y="${barY}" width="${W-ML-MR}" height="${barH}" rx="4" fill="#1a1d28" stroke="rgba(186,163,112,.1)" stroke-width=".5"/>`;

  // Section dividers
  if(tab==='all'){
    [1,2,3,4].forEach(i=>{
      const x=ML+i*bkW;
      v+=`<line x1="${x}" y1="${barY+4}" x2="${x}" y2="${barY+barH-4}" stroke="rgba(186,163,112,.08)" stroke-width="1"/>`;
    });
  }

  // Chiasm letter labels above books
  bkPos.forEach(b=>{
    const active=curFb.some(x=>x.id===b.id);
    const isLev=b.id==='lev';
    v+=`<text x="${b.cx}" y="${barY-(isLev?LEV_EXTRA+10:8)}" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="${isLev?11:9.5}" fill="${active?(isLev?'rgba(200,160,224,.75)':'rgba(200,196,186,.5)'):'rgba(200,196,186,.18)'}" font-style="italic">${b.letter}</text>`;
  });

  // Tab label above targets
  const tLabel=tab==='ad'?'A · Genesis  ↔  A′ · Deuteronomy'
    :tab==='en'?'B · Exodus  ↔  B′ · Numbers'
    :tab==='lev'?'C · Leviticus — Theological Center'
    :'Torah · A · B · C · B′ · A′';
  v+=`<text x="${W/2}" y="${targetY-12}" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="9" fill="rgba(186,163,112,.28)" letter-spacing=".1em">${tLabel.toUpperCase()}</text>`;

  // Draw arcs
  const arcData=[];
  tPos.forEach(tgt=>{
    const src=bkPos.find(b=>b.id===tgt.book);
    if(!src) return;
    const isLev=tgt.pair==='lev';
    const x1=src.cx, y1=barY+barH, x2=tgt.cx, y2=targetY;
    const dist=Math.abs(x2-x1);
    const dir=x2>x1?1:x2<x1?-1:(arcData.length%2===0?1:-1);
    const bow=dist<55?(28-dist/2)*dir:0;
    const cp1x=x1+(x2-x1)*.28+bow*.5, cp1y=y1+arcZone*.3;
    const cp2x=x2-(x2-x1)*.28-bow*.5, cp2y=y2-arcZone*.3;
    const d=`M${x1},${y1} C${cp1x},${cp1y} ${cp2x},${cp2y} ${x2},${y2}`;
    const bk=BOOKS.find(b=>b.id===tgt.book);
    arcData.push({d,pid:tgt.id,bid:tgt.book,isLev});
    const sw=isLev?2.2:1.2;
    const op=isLev?.32:.18;
    const filt=isLev?' filter="url(#levglow)"':'';
    v+=`<path class="arc" data-pid="${tgt.id}" data-bid="${tgt.book}" d="${d}" stroke="${bk.cb}" stroke-width="${sw}" opacity="${op}"${filt}/>`;
  });
  arcData.forEach(a=>{
    v+=`<path class="arc-hit" data-pid="${a.pid}" data-bid="${a.bid}" d="${a.d}"/>`;
  });

  // Book segments — Lev gets extended height on top
  bkPos.forEach(b=>{
    const isInTab=curFb.some(x=>x.id===b.id);
    const isLev=b.id==='lev';
    const cnt=curFp.filter(p=>p.book===b.id).length;
    const segY=isLev?barY-LEV_EXTRA:barY;
    const segH=isLev?barH+LEV_EXTRA:barH;
    v+=`<g class="bk-seg" data-bid="${b.id}" style="cursor:pointer">`;
    if(isLev&&isInTab){
      // Outer glow ring for Lev
      v+=`<rect x="${b.x-2}" y="${segY-2}" width="${b.w+4}" height="${segH+4}" rx="5" fill="none" stroke="rgba(200,160,224,.22)" stroke-width="1.5"/>`;
    }
    v+=`<rect x="${b.x+.5}" y="${segY+.5}" width="${b.w-1}" height="${segH-1}" rx="${isLev?5:3}" fill="${b.c}" fill-opacity="${isInTab?(isLev?.7:.55):.15}" stroke="${isLev&&isInTab?'rgba(200,160,224,.45)':'transparent'}" stroke-width="${isLev?1.5:0}"/>`;
    const fs=b.w>72?10:b.w>55?8.5:7.5;
    v+=`<text x="${b.cx}" y="${segY+segH/2+4}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="${isLev?fs+1:fs}" font-weight="600" fill="rgba(255,255,255,${isInTab?.82:.25})">${b.sh}</text>`;
    if(cnt>0&&b.w>42){
      v+=`<circle cx="${b.x+b.w-10}" cy="${segY+10}" r="7" fill="rgba(0,0,0,.5)" stroke="${b.cb}" stroke-width=".6"/>`;
      v+=`<text x="${b.x+b.w-10}" y="${segY+13.5}" text-anchor="middle" font-size="7.5" font-weight="600" fill="${b.cb}" font-family="DM Sans">${cnt}</text>`;
    }
    v+=`</g>`;
  });

  // Target labels (rotated 52°)
  tPos.forEach(tgt=>{
    const bk=BOOKS.find(b=>b.id===tgt.book);
    v+=`<g class="tgt-g" data-pid="${tgt.id}" data-bid="${tgt.book}" style="cursor:pointer" opacity=".75">`;
    v+=`<line x1="${tgt.cx}" y1="${targetY}" x2="${tgt.cx}" y2="${targetY+5}" stroke="var(--tx-d)" stroke-width="1.5"/>`;
    v+=`<text x="${tgt.cx}" y="${targetY+10}" text-anchor="start" transform="rotate(52,${tgt.cx},${targetY+10})" font-size="11" fill="var(--tx)" font-family="Cormorant Garamond,serif" font-weight="400">${tgt.label}</text>`;
    v+=`</g>`;
  });

  v+=`</svg>`;
  area.innerHTML=v;

  // ── Events ──
  area.querySelectorAll('.arc-hit').forEach(el=>{
    const pid=el.dataset.pid;
    el.addEventListener('mouseenter',()=>{ if(locked)return; hovered={type:'target',id:pid}; showTarget(pid); applyHighlight(); });
    el.addEventListener('mouseleave',()=>{ if(locked)return; hovered=null; clrInfo(); applyHighlight(); });
    el.addEventListener('click',e=>{ e.stopPropagation(); if(locked&&locked.type==='target'&&locked.id===pid){locked=null;clrInfo();}else{locked={type:'target',id:pid};showTarget(pid);} hovered=null; applyHighlight(); });
  });
  area.querySelectorAll('.bk-seg').forEach(el=>{
    const bid=el.dataset.bid;
    el.addEventListener('mouseenter',()=>{ if(locked)return; hovered={type:'book',id:bid}; showBook(bid); applyHighlight(); });
    el.addEventListener('mouseleave',()=>{ if(locked)return; hovered=null; clrInfo(); applyHighlight(); });
    el.addEventListener('click',e=>{ e.stopPropagation(); if(locked&&locked.type==='book'&&locked.id===bid){locked=null;clrInfo();}else{locked={type:'book',id:bid};showBook(bid);} hovered=null; applyHighlight(); });
  });
  area.querySelectorAll('.tgt-g').forEach(el=>{
    const pid=el.dataset.pid;
    el.addEventListener('mouseenter',()=>{ if(locked)return; hovered={type:'target',id:pid}; showTarget(pid); applyHighlight(); });
    el.addEventListener('mouseleave',()=>{ if(locked)return; hovered=null; clrInfo(); applyHighlight(); });
    el.addEventListener('click',e=>{ e.stopPropagation(); if(locked&&locked.type==='target'&&locked.id===pid){locked=null;clrInfo();}else{locked={type:'target',id:pid};showTarget(pid);} hovered=null; applyHighlight(); });
  });
  area.addEventListener('click',()=>{ if(locked){locked=null;hovered=null;clrInfo();applyHighlight();} });

  // Legend
  const le=document.getElementById('legend'); le.innerHTML='';
  [
    {color:'var(--col-ab)',label:'A · A′ — Genesis ↔ Deuteronomy',show:tab==='all'||tab==='ad'},
    {color:'var(--col-bb)',label:'B · B′ — Exodus ↔ Numbers',show:tab==='all'||tab==='en'},
    {color:'var(--col-cb)',label:'C — Leviticus (Theological Center)',show:tab==='all'||tab==='lev'},
  ].forEach(it=>{ if(!it.show)return; const d=document.createElement('div'); d.className='leg'; d.innerHTML=`<span class="dot" style="background:${it.color}"></span><span>${it.label}</span>`; le.appendChild(d); });

  applyHighlight();
  if(locked){ if(locked.type==='book')showBook(locked.id); else showTarget(locked.id); }
}

function go(t){
  tab=t; locked=null; hovered=null;
  ['all','ad','en','lev'].forEach(k=>{
    const el=document.getElementById('t-'+k);
    if(el) el.className='tbtn'+(k===t?' a-'+k:'');
  });
  clrInfo(); draw();
}

// Touch
document.addEventListener('touchstart',e=>{
  const sg=e.target.closest('.bk-seg'),tg=e.target.closest('.tgt-g'),ah=e.target.closest('.arc-hit');
  if(sg){e.preventDefault();const bid=sg.dataset.bid;if(locked&&locked.type==='book'&&locked.id===bid){locked=null;clrInfo();}else{locked={type:'book',id:bid};showBook(bid);}hovered=null;applyHighlight();}
  else if(tg){e.preventDefault();const pid=tg.dataset.pid;if(locked&&locked.type==='target'&&locked.id===pid){locked=null;clrInfo();}else{locked={type:'target',id:pid};showTarget(pid);}hovered=null;applyHighlight();}
  else if(ah){e.preventDefault();const pid=ah.dataset.pid;if(locked&&locked.type==='target'&&locked.id===pid){locked=null;clrInfo();}else{locked={type:'target',id:pid};showTarget(pid);}hovered=null;applyHighlight();}
  else if(!e.target.closest('.tbtn')){locked=null;hovered=null;clrInfo();applyHighlight();}
},{passive:false});

draw();
</script>
</div>

  import NavigationComponent from '/assets/js/nav-component.js';
  new NavigationComponent({ currentPage:'resources/connections-corner/torah-symmetry', hubType:'connections' });
